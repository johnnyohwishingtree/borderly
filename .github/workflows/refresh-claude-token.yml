name: Refresh Claude OAuth Token

on:
  schedule:
    - cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch: # Manual trigger for testing

concurrency:
  group: claude-token-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for active Claude workflows
        id: check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Check if any Claude Code workflows are currently running
          ACTIVE=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "claude.yml" \
            --status in_progress \
            --json databaseId \
            --jq 'length' 2>/dev/null || echo "0")

          echo "Active Claude workflows: $ACTIVE"

          if [ "$ACTIVE" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping refresh — Claude workflow(s) in progress"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh OAuth token
        if: steps.check.outputs.skip != 'true'
        env:
          REFRESH_TOKEN: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RESPONSE=$(curl -s -X POST "https://platform.claude.com/v1/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${REFRESH_TOKEN}&client_id=9d1c250a-e61b-44d9-88ed-5944d1962f5e")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to refresh OAuth token"
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
            exit 1
          fi

          # Save the rotated refresh token
          NEW_REFRESH=$(echo "$RESPONSE" | jq -r '.refresh_token // empty')
          if [ -n "$NEW_REFRESH" ]; then
            echo "::add-mask::$NEW_REFRESH"
            gh secret set CLAUDE_REFRESH_TOKEN --repo "${{ github.repository }}" --body "$NEW_REFRESH"
            echo "Refresh token rotated"
          fi

          # Save the access token for Claude workflows to use
          echo "::add-mask::$ACCESS_TOKEN"
          gh secret set CLAUDE_ACCESS_TOKEN --repo "${{ github.repository }}" --body "$ACCESS_TOKEN"
          echo "Access token saved"
