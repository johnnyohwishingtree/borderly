name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Fail if new type errors introduced
        run: |
          # Count type errors — fail only if this PR introduced new ones
          # TODO: Remove continue-on-error above once pre-existing TS errors are fixed
          ERRORS=$(pnpm typecheck 2>&1 | grep -c "^src/" || echo "0")
          echo "TypeScript errors: $ERRORS"
          # Known pre-existing error count as of this PR
          BASELINE=76
          if [ "$ERRORS" -gt "$BASELINE" ]; then
            echo "::error::New TypeScript errors introduced ($ERRORS > baseline $BASELINE)"
            exit 1
          fi
          echo "No new TypeScript errors (at or below baseline of $BASELINE)"

      - name: Metro bundle check
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output /tmp/ios-bundle.js \
            --assets-dest /tmp/ios-assets 2>&1 | tee /tmp/bundle_output.txt
          exit ${PIPESTATUS[0]}

      - name: Run tests
        id: tests
        run: |
          pnpm test --ci --forceExit 2>&1 | tee /tmp/test_output.txt
          exit ${PIPESTATUS[0]}

      - name: Notify Claude on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          BRANCH="${{ github.head_ref }}"

          # Only auto-fix on claude/ branches (don't spam human PRs)
          if [[ "$BRANCH" != claude/* ]]; then
            echo "Not a claude/ branch — skipping"
            exit 0
          fi

          # Limit fix attempts to 3
          FIX_COUNT=$(gh pr view "$PR_NUM" --json comments \
            -q '[.comments[] | select(.body | contains("@claude")) | select(.body | contains("Tests are failing"))] | length' 2>/dev/null || echo "0")

          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "Already $FIX_COUNT fix attempts — needs human review"
            exit 0
          fi

          # Extract failure summary from test and bundle output
          FAILURES=""
          if [ -f /tmp/test_output.txt ]; then
            FAILURES=$(grep -E '(FAILED |ERRORS |ERROR |assert |Error:)' /tmp/test_output.txt | tail -20 || echo "")
          fi
          if [ -f /tmp/bundle_output.txt ]; then
            BUNDLE_ERRORS=$(grep -E '(error:|Unable to resolve|Error:)' /tmp/bundle_output.txt | tail -10 || echo "")
            if [ -n "$BUNDLE_ERRORS" ]; then
              FAILURES="${FAILURES}

          Metro bundle errors:
          ${BUNDLE_ERRORS}"
            fi
          fi

          if [ -n "$FAILURES" ]; then
            BODY="@claude Tests are failing on this PR. Here are the failures:

          \`\`\`
          ${FAILURES}
          \`\`\`

          Fix all of these failures. IMPORTANT: After making changes, you MUST run \`pnpm typecheck\`, \`pnpm test\`, and \`pnpm e2e\` locally to verify ALL checks pass BEFORE committing. Do NOT push code that still has failing checks. Then git add, git commit, and git push. (Auto-fix attempt $((FIX_COUNT + 1))/3)"
            gh pr comment "$PR_NUM" --body "$BODY"
          else
            gh pr comment "$PR_NUM" \
              --body "@claude Tests are failing on this PR. Check the test output, fix all failures. IMPORTANT: After making changes, you MUST run \`pnpm typecheck\`, \`pnpm test\`, and \`pnpm e2e\` locally to verify ALL checks pass BEFORE committing. Do NOT push code that still has failing checks. Then git add, git commit, and git push. (Auto-fix attempt $((FIX_COUNT + 1))/3)"
          fi
