name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Fail if new type errors introduced
        run: |
          # Count type errors — fail only if this PR introduced new ones
          # TODO: Remove continue-on-error above once pre-existing TS errors are fixed
          pnpm typecheck 2>&1 | tee /tmp/typecheck_output.txt || true
          ERRORS=$(grep -c "^src/\|error TS" /tmp/typecheck_output.txt || echo "0")
          echo "TypeScript errors: $ERRORS"
          # Known pre-existing error count as of this PR
          BASELINE=76
          if [ "$ERRORS" -gt "$BASELINE" ]; then
            echo "::error::New TypeScript errors introduced ($ERRORS > baseline $BASELINE)"
            exit 1
          fi
          echo "No new TypeScript errors (at or below baseline of $BASELINE)"

      - name: Metro bundle check
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output /tmp/ios-bundle.js \
            --assets-dest /tmp/ios-assets 2>&1 | tee /tmp/bundle_output.txt
          exit ${PIPESTATUS[0]}

      - name: Run tests
        id: tests
        run: |
          pnpm test --ci --forceExit 2>&1 | tee /tmp/test_output.txt
          exit ${PIPESTATUS[0]}

      - name: Notify Claude on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          BRANCH="${{ github.head_ref }}"

          # Only auto-fix on claude/ branches (don't spam human PRs)
          if [[ "$BRANCH" != claude/* ]]; then
            echo "Not a claude/ branch — skipping"
            exit 0
          fi

          # Limit fix attempts to 3
          FIX_COUNT=$(gh pr view "$PR_NUM" --json comments \
            -q '[.comments[] | select(.body | contains("@claude")) | select(.body | contains("Tests are failing"))] | length' 2>/dev/null || echo "0")

          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "Already $FIX_COUNT fix attempts — needs human review"
            exit 0
          fi

          # Extract failure summary from all check outputs
          FAILURES=""

          # TypeScript errors
          if [ -f /tmp/typecheck_output.txt ]; then
            TS_ERRORS=$(grep "error TS" /tmp/typecheck_output.txt | head -15 || echo "")
            if [ -n "$TS_ERRORS" ]; then
              TS_COUNT=$(echo "$TS_ERRORS" | wc -l | tr -d ' ')
              FAILURES="TYPECHECK ERRORS ($TS_COUNT shown):
          ${TS_ERRORS}"
            fi
          fi

          # Test failures
          if [ -f /tmp/test_output.txt ]; then
            TEST_ERRORS=$(grep -E '(FAIL __tests|● .+|Expected:|Received:)' /tmp/test_output.txt | head -20 || echo "")
            if [ -n "$TEST_ERRORS" ]; then
              FAILURES="${FAILURES}

          TEST FAILURES:
          ${TEST_ERRORS}"
            fi
          fi

          # Metro bundle errors
          if [ -f /tmp/bundle_output.txt ]; then
            BUNDLE_ERRORS=$(grep -E '(error:|Unable to resolve|Error:)' /tmp/bundle_output.txt | tail -10 || echo "")
            if [ -n "$BUNDLE_ERRORS" ]; then
              FAILURES="${FAILURES}

          METRO BUNDLE ERRORS:
          ${BUNDLE_ERRORS}"
            fi
          fi

          if [ -z "$FAILURES" ]; then
            FAILURES="(No error details captured — check the workflow run logs)"
          fi

          BODY="@claude CI is failing on this PR. Here are the errors:

          \`\`\`
          ${FAILURES}
          \`\`\`

          Diagnose the root cause from the errors above and fix it. Common patterns:
          - **error TS2341 (private property)**: Test is accessing a private method — use a public API or cast to \`any\` for testing.
          - **error TS2322/TS2345 (type mismatch)**: Test object is missing required properties — add them or use \`Partial<T>\`.
          - **FAIL __tests/**: Jest test assertion failure — check expected vs received values.

          IMPORTANT: After fixing, run \`pnpm typecheck && pnpm test\` to verify BEFORE pushing. Do NOT push code that still fails. Then git add, commit, and push. (Auto-fix attempt $((FIX_COUNT + 1))/3)"

          gh pr comment "$PR_NUM" --body "$BODY"
