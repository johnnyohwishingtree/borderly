name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Metro bundle check
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output /tmp/ios-bundle.js \
            --assets-dest /tmp/ios-assets 2>&1 | tee /tmp/bundle_output.txt
          exit ${PIPESTATUS[0]}

      - name: Run tests
        id: tests
        run: |
          pnpm test --ci --forceExit 2>&1 | tee /tmp/test_output.txt
          exit ${PIPESTATUS[0]}

      - name: Notify Claude on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          BRANCH="${{ github.head_ref }}"

          # Only auto-fix on claude/ branches (don't spam human PRs)
          if [[ "$BRANCH" != claude/* ]]; then
            echo "Not a claude/ branch — skipping"
            exit 0
          fi

          # Limit fix attempts to 3
          FIX_COUNT=$(gh pr view "$PR_NUM" --json comments \
            -q '[.comments[] | select(.body | contains("@claude")) | select(.body | contains("CI is failing"))] | length' 2>/dev/null || echo "0")

          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "Already $FIX_COUNT fix attempts — needs human review"
            exit 0
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Identify which steps failed
          FAILED_STEPS=$(gh run view ${{ github.run_id }} --json jobs \
            -q '[.jobs[].steps[] | select(.conclusion == "failure") | .name] | join(", ")' 2>/dev/null || echo "unknown")

          BODY="@claude CI is failing on this PR.

          **Failed steps:** ${FAILED_STEPS}
          **Run URL:** ${RUN_URL}

          Use \`gh run view ${{ github.run_id }} --log-failed\` to see the full error output from the failed steps. Diagnose the root cause and fix it.

          IMPORTANT: After fixing, you MUST run \`pnpm typecheck\`, \`pnpm test\`, and \`pnpm e2e\` locally to verify ALL checks pass BEFORE committing. Do NOT push code that still has failing checks. Then git add, git commit, and git push. (Auto-fix attempt $((FIX_COUNT + 1))/3)"

          gh pr comment "$PR_NUM" --body "$BODY"
