name: E2E Smoke Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # Shared webpack build — cached and reused by all test jobs
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Build webpack bundle
        run: npx webpack --config webpack.config.js
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
          retention-days: 1

  # Core chromium tests (24 tests) + QR workflow (7 tests)
  test-chromium:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
      - name: Run chromium + QR tests
        run: npx playwright test --reporter=line
        env:
          CI: true
          E2E_PROJECT: chromium,qr-workflow

  # Performance tests (9 tests) — run in parallel with chromium
  test-performance:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
      - name: Run performance tests
        run: npx playwright test --reporter=line
        env:
          CI: true
          E2E_PROJECT: performance

  # Cross-browser smoke (firefox + mobile) — run in parallel
  test-cross-browser:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Install Playwright browsers
        run: npx playwright install chromium firefox
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
      - name: Run cross-browser smoke tests
        run: npx playwright test --reporter=line
        env:
          CI: true
          E2E_PROJECT: firefox-smoke,mobile-smoke

  # Notify Claude on failure (runs after all test jobs)
  notify:
    needs: [test-chromium, test-performance, test-cross-browser]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Notify Claude on failure
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          BRANCH="${{ github.head_ref }}"

          if [[ "$BRANCH" != claude/* ]]; then
            echo "Not a claude/ branch — skipping"
            exit 0
          fi

          FIX_COUNT=$(gh pr view "$PR_NUM" --json comments \
            -q '[.comments[] | select(.body | contains("@claude")) | select(.body | contains("E2E smoke tests are failing"))] | length' 2>/dev/null || echo "0")

          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "Already $FIX_COUNT fix attempts — needs human review"
            exit 0
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Identify which jobs failed
          FAILED_JOBS=$(gh run view ${{ github.run_id }} --json jobs \
            -q '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")' 2>/dev/null || echo "unknown")

          BODY="@claude E2E smoke tests are failing on this PR.

          **Failed jobs:** ${FAILED_JOBS}
          **Run URL:** ${RUN_URL}

          Use \`gh run view ${{ github.run_id }} --log-failed\` to see the full error output. Diagnose the root cause and fix it. Common issues:
          - **Module parse failed / Unexpected token**: A native module needs a web mock in \`e2e/mocks/\` + alias in \`webpack.config.js\`.
          - **Module not found**: Missing dependency or wrong import path.
          - **E2E test failures**: Screen crashing or not rendering correctly.

          IMPORTANT: After fixing, run \`pnpm typecheck\`, \`pnpm test\`, and \`pnpm e2e\` locally to verify ALL checks pass BEFORE committing. Then git add, git commit, and git push. (Auto-fix attempt $((FIX_COUNT + 1))/3)"

          gh pr comment "$PR_NUM" --body "$BODY"
