name: E2E Smoke Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # Shared webpack build — cached and reused by all test jobs
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Build webpack bundle
        run: npx webpack --config webpack.config.js
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
          retention-days: 1

  # Core chromium tests (24 tests) + QR workflow (7 tests)
  test-chromium:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
      - name: Run chromium + QR tests
        run: npx playwright test --reporter=line
        env:
          CI: true
          E2E_PROJECT: chromium,qr-workflow

  # Performance tests (9 tests) — run in parallel with chromium
  test-performance:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
      - name: Run performance tests
        run: npx playwright test --reporter=line
        env:
          CI: true
          E2E_PROJECT: performance

  # Cross-browser smoke (firefox + mobile) — run in parallel
  test-cross-browser:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Install Playwright browsers
        run: npx playwright install chromium firefox
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: e2e-bundle
          path: e2e/dist/
      - name: Run cross-browser smoke tests
        run: npx playwright test --reporter=line
        env:
          CI: true
          E2E_PROJECT: firefox-smoke,mobile-smoke

  # Notify Claude on failure (runs after all test jobs)
  notify:
    needs: [test-chromium, test-performance, test-cross-browser]
    if: failure() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Notify Claude on failure
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          BRANCH="${{ github.head_ref }}"

          if [[ "$BRANCH" != claude/* ]]; then
            echo "Not a claude/ branch — skipping"
            exit 0
          fi

          FIX_COUNT=$(gh pr view "$PR_NUM" --json comments \
            -q '[.comments[] | select(.body | contains("@claude")) | select(.body | contains("E2E smoke tests are failing"))] | length' 2>/dev/null || echo "0")

          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "Already $FIX_COUNT fix attempts — needs human review"
            exit 0
          fi

          # Extract errors from the failed run logs
          RUN_ID=${{ github.run_id }}
          FAILURES=""

          # Webpack build errors
          BUILD_ERRORS=$(gh run view "$RUN_ID" --log 2>/dev/null \
            | grep -E "ERROR|Module parse failed|Module not found|Unexpected token" \
            | sed 's/^[^\t]*\t[^\t]*\t//' | head -10 || echo "")
          if [ -n "$BUILD_ERRORS" ]; then
            FAILURES="WEBPACK BUILD ERRORS:
          ${BUILD_ERRORS}"
          fi

          # Playwright test errors
          E2E_ERRORS=$(gh run view "$RUN_ID" --log 2>/dev/null \
            | grep -E "Error:|TimeoutError:|expect\(locator\)|FAIL|✘" \
            | sed 's/^[^\t]*\t[^\t]*\t//' | head -15 || echo "")
          if [ -n "$E2E_ERRORS" ]; then
            FAILURES="${FAILURES}

          E2E TEST ERRORS:
          ${E2E_ERRORS}"
          fi

          if [ -z "$FAILURES" ]; then
            FAILURES="(Could not extract errors — check workflow run logs)"
          fi

          BODY="@claude E2E smoke tests are failing on this PR. Here are the errors:

          \`\`\`
          ${FAILURES}
          \`\`\`

          Diagnose the root cause and fix it. Common issues:
          - **Module parse failed / Unexpected token**: A native module needs a web mock in \`e2e/mocks/\` + alias in \`webpack.config.js\`.
          - **expect(locator).toBeVisible() failed**: Screen element not rendering — check the component renders correctly in the web build.
          - **TimeoutError**: Element takes too long to appear — check if the component depends on async data that isn't mocked.

          IMPORTANT: After fixing, run ALL checks before pushing:
          1. \`pnpm typecheck\` — must exit 0
          2. \`pnpm test\` — must exit 0
          3. \`npx webpack --config webpack.config.js\` — must exit 0
          Then git add, commit, and push. (Auto-fix attempt $((FIX_COUNT + 1))/3)"

          gh pr comment "$PR_NUM" --body "$BODY"
