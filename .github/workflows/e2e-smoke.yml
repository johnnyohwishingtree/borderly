name: E2E Smoke Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e-web:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build web bundle
        id: build
        run: npx webpack --config webpack.config.js 2>&1 | tee /tmp/build_output.txt

      - name: Run E2E smoke tests
        id: e2e
        run: npx playwright test --reporter=line 2>&1 | tee /tmp/e2e_output.txt
        env:
          CI: true

      - name: Notify Claude on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          BRANCH="${{ github.head_ref }}"

          if [[ "$BRANCH" != claude/* ]]; then
            echo "Not a claude/ branch — skipping"
            exit 0
          fi

          FIX_COUNT=$(gh pr view "$PR_NUM" --json comments \
            -q '[.comments[] | select(.body | contains("@claude")) | select(.body | contains("E2E smoke tests are failing"))] | length' 2>/dev/null || echo "0")

          if [ "$FIX_COUNT" -ge 3 ]; then
            echo "Already $FIX_COUNT fix attempts — needs human review"
            exit 0
          fi

          # Collect errors from whichever step failed
          FAILURES=""
          if [ -f /tmp/build_output.txt ]; then
            BUILD_ERRORS=$(grep -E '(ERROR|Module parse failed|Module not found|Unexpected token|Cannot resolve)' /tmp/build_output.txt | tail -15 || echo "")
            if [ -n "$BUILD_ERRORS" ]; then
              FAILURES="WEBPACK BUILD ERRORS:
          ${BUILD_ERRORS}"
            fi
          fi
          if [ -f /tmp/e2e_output.txt ]; then
            E2E_ERRORS=$(grep -E '(FAILED|failed|Error|✘|expect\()' /tmp/e2e_output.txt | tail -15 || echo "")
            if [ -n "$E2E_ERRORS" ]; then
              FAILURES="${FAILURES}
          E2E TEST ERRORS:
          ${E2E_ERRORS}"
            fi
          fi

          if [ -z "$FAILURES" ]; then
            FAILURES="(No error details captured — check the workflow run logs)"
          fi

          BODY="@claude E2E smoke tests are failing on this PR. Here are the errors:

          \`\`\`
          ${FAILURES}
          \`\`\`

          Diagnose the root cause from the errors above and fix it. Common issues:
          - **Module parse failed / Unexpected token**: A native module needs a web mock. Add an alias in \`webpack.config.js\` pointing to a mock in \`e2e/mocks/\`.
          - **Module not found**: A dependency is missing or an import path is wrong.
          - **E2E test failures**: A screen is crashing or not rendering correctly.

          Check \`webpack.config.js\` for existing mock patterns. After fixing, verify by running: \`npx webpack --config webpack.config.js\`

          IMPORTANT: After making changes, you MUST run \`pnpm typecheck\`, \`pnpm test\`, and \`pnpm e2e\` locally to verify ALL checks pass BEFORE committing. Do NOT push code that still has failing checks. Then git add, git commit, and git push. (Auto-fix attempt $((FIX_COUNT + 1))/3)"

          gh pr comment "$PR_NUM" --body "$BODY"
