name: E2E Smoke Tests

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Try restoring cached app binary
        id: app-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/Borderly.app.tar.gz
          key: ios-app-${{ hashFiles('ios/Podfile.lock', 'package.json') }}

      - name: Build iOS app (cache miss)
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — building from source"
          cd ios && pod install
          cd ..
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
              for d in devices:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid'])
                  sys.exit(0)
          sys.exit(1)
          ")
          echo "SIMULATOR_UDID=$DEVICE" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE" 2>/dev/null || true
          xcodebuild \
            -workspace ios/Borderly.xcworkspace \
            -scheme Borderly \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$DEVICE" \
            -derivedDataPath ios/build \
            build 2>&1 | xcbeautify --quiet || tail -30
          APP_PATH=$(find ios/build -name "*.app" -type d | head -1)
          cd "$(dirname "$APP_PATH")"
          tar czf /tmp/Borderly.app.tar.gz "$(basename "$APP_PATH")"
        env:
          NO_FLIPPER: 1

      - name: Save app binary to cache
        if: steps.app-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/Borderly.app.tar.gz
          key: ios-app-${{ hashFiles('ios/Podfile.lock', 'package.json') }}

      - name: Boot iOS simulator
        if: steps.app-cache.outputs.cache-hit == 'true'
        run: |
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
            if 'iOS' in runtime:
              for d in devices:
                if 'iPhone' in d['name'] and d['isAvailable']:
                  print(d['udid'])
                  sys.exit(0)
          sys.exit(1)
          ")
          echo "Booting simulator: $DEVICE"
          xcrun simctl boot "$DEVICE" 2>/dev/null || true
          echo "SIMULATOR_UDID=$DEVICE" >> $GITHUB_ENV

      - name: Install cached app on simulator
        run: |
          cd /tmp
          tar xzf Borderly.app.tar.gz
          APP_PATH=$(find /tmp -maxdepth 1 -name "*.app" -type d | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start Metro bundler
        run: |
          npx react-native start --reset-cache &
          # Wait for Metro to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8081/status | grep -q "packager-status:running"; then
              echo "Metro is ready"
              break
            fi
            sleep 2
          done

      - name: Run smoke tests
        id: maestro
        run: |
          maestro test .maestro/app-smoke.yaml \
            --format junit \
            --output /tmp/maestro-results.xml \
            --debug-output /tmp/maestro-debug 2>&1 | tee /tmp/maestro_output.txt
          exit ${PIPESTATUS[0]}

      - name: Run onboarding flow test
        if: success()
        run: |
          maestro test .maestro/onboarding-flow.yaml \
            --format junit \
            --output /tmp/maestro-onboarding-results.xml \
            --debug-output /tmp/maestro-debug-onboarding 2>&1 | tee -a /tmp/maestro_output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: |
            /tmp/maestro-debug/
            /tmp/maestro-debug-onboarding/
          retention-days: 7

      - name: Notify Claude on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          BRANCH="${{ github.head_ref }}"

          if [[ "$BRANCH" != claude/* ]]; then
            echo "Not a claude/ branch — skipping"
            exit 0
          fi

          FIX_COUNT=$(gh pr view "$PR_NUM" --json comments \
            -q '[.comments[] | select(.body | contains("@claude")) | select(.body | contains("E2E smoke tests are failing"))] | length' 2>/dev/null || echo "0")

          if [ "$FIX_COUNT" -ge 2 ]; then
            echo "Already $FIX_COUNT fix attempts — needs human review"
            exit 0
          fi

          FAILURES=""
          if [ -f /tmp/maestro_output.txt ]; then
            FAILURES=$(grep -E '(FAILED|ERROR|Unable|error:)' /tmp/maestro_output.txt | tail -20 || echo "")
          fi

          BODY="@claude E2E smoke tests are failing on this PR. The app either crashes on launch or a screen fails to render correctly.

          \`\`\`
          ${FAILURES}
          \`\`\`

          Debug: Check the Maestro screenshots in the GitHub Actions artifacts for visual context.

          Fix the runtime errors. Make sure the app launches and all screens render without crashing. IMPORTANT: You MUST git add, git commit, and git push your changes before finishing. (Auto-fix attempt $((FIX_COUNT + 1))/2)"

          gh pr comment "$PR_NUM" --body "$BODY"
