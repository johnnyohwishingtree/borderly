name: Pipeline Doctor
run-name: "Doctor: issue #${{ inputs.issue_number }} (${{ inputs.trigger_source }})"

# Diagnoses pipeline failures by collecting evidence from failed workflow runs,
# branch state, and issue history. Uses Claude to identify root causes and either
# creates a fix PR or opens a diagnostic issue with full context and links.
#
# Trigger points:
#   - verify-merge give-up job (after 6 failed fix attempts)
#   - watcher (story stuck at max retries)
#   - manual (pass an issue number to diagnose)

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to diagnose'
        required: true
        type: string
      trigger_source:
        description: 'What triggered this (watcher / verify-merge / manual)'
        required: false
        type: string
        default: 'manual'
      failed_run_ids:
        description: 'Comma-separated list of failed run IDs to analyze'
        required: false
        type: string

concurrency:
  group: pipeline-doctor-${{ inputs.issue_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure git and auth
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "Pipeline Doctor"
          git config user.email "pipeline-doctor@users.noreply.github.com"

      - name: Collect evidence
        id: evidence
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ inputs.issue_number }}
          FAILED_RUN_IDS: ${{ inputs.failed_run_ids }}
        run: |
          set -euo pipefail
          EVIDENCE_FILE="/tmp/pipeline-doctor-evidence.md"
          echo "" > "$EVIDENCE_FILE"

          # ── Issue context ──
          echo "## Issue #${ISSUE_NUM}" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"
          echo "**Link:** https://github.com/${REPO}/issues/${ISSUE_NUM}" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          ISSUE_DATA=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json title,body,labels,state,comments 2>/dev/null || echo "{}")
          ISSUE_TITLE=$(echo "$ISSUE_DATA" | jq -r '.title // "unknown"')
          ISSUE_STATE=$(echo "$ISSUE_DATA" | jq -r '.state // "unknown"')
          ISSUE_LABELS=$(echo "$ISSUE_DATA" | jq -r '[.labels[].name] | join(", ") // "none"')

          echo "**Title:** $ISSUE_TITLE" >> "$EVIDENCE_FILE"
          echo "**State:** $ISSUE_STATE" >> "$EVIDENCE_FILE"
          echo "**Labels:** $ISSUE_LABELS" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # Issue body (truncated)
          ISSUE_BODY=$(echo "$ISSUE_DATA" | jq -r '.body // ""' | head -50)
          echo "<details><summary>Issue body (first 50 lines)</summary>" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"
          echo '```' >> "$EVIDENCE_FILE"
          echo "$ISSUE_BODY" >> "$EVIDENCE_FILE"
          echo '```' >> "$EVIDENCE_FILE"
          echo "</details>" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # Recent comments (last 10, pipeline-related)
          echo "### Recent pipeline comments" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"
          echo "$ISSUE_DATA" | jq -r '
            [.comments[] | select(
              (.body | test("@claude|verify|fix attempt|pipeline|doctor|give.up|timed out|stuck"; "i"))
            )] | last(10) | .[] |
            "**\(.author.login // "unknown")** (\(.createdAt // "?")):\n\(.body | split("\n") | first(5) | join("\n"))\n"
          ' >> "$EVIDENCE_FILE" 2>/dev/null || echo "(no pipeline comments found)" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # ── Related branches + commit context ──
          echo "## Branches" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          BEST_BRANCH=""
          BEST_AHEAD=0

          for PATTERN in "claude/issue-${ISSUE_NUM}" "claude/issue-${ISSUE_NUM}-" "tmp/claude-"; do
            git for-each-ref --format='%(refname:short) %(objectname:short) %(creatordate:relative)' \
              "refs/remotes/origin/${PATTERN}*" 2>/dev/null | while read -r ref sha date; do
              BRANCH=$(echo "$ref" | sed 's|^origin/||')
              AHEAD=$(git rev-list --count "origin/master..$ref" 2>/dev/null || echo "?")
              echo "- [\`$BRANCH\`](https://github.com/${REPO}/tree/${BRANCH}) — $sha, ${AHEAD} commits ahead, $date" >> "$EVIDENCE_FILE"
            done
          done
          echo "" >> "$EVIDENCE_FILE"

          # Find the branch with most work (most commits ahead of master)
          for ref in $(git for-each-ref --format='%(refname:short)' \
            "refs/remotes/origin/claude/issue-${ISSUE_NUM}" \
            "refs/remotes/origin/claude/issue-${ISSUE_NUM}-*" \
            2>/dev/null); do
            AHEAD=$(git rev-list --count "origin/master..$ref" 2>/dev/null || echo "0")
            if [ "$AHEAD" -gt "$BEST_AHEAD" ]; then
              BEST_AHEAD=$AHEAD
              BEST_BRANCH=$(echo "$ref" | sed 's|^origin/||')
            fi
          done

          # ── Work branch commit history and diff ──
          if [ -n "$BEST_BRANCH" ] && [ "$BEST_AHEAD" -gt 0 ]; then
            echo "## Work Branch Analysis: \`$BEST_BRANCH\`" >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"
            echo "This branch has **$BEST_AHEAD commits** ahead of master. Use this to understand what was intentionally changed." >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"

            echo "### Commit log" >> "$EVIDENCE_FILE"
            echo '```' >> "$EVIDENCE_FILE"
            git log --oneline "origin/master..origin/$BEST_BRANCH" 2>/dev/null | head -30 >> "$EVIDENCE_FILE"
            echo '```' >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"

            echo "### Files changed vs master" >> "$EVIDENCE_FILE"
            echo '```' >> "$EVIDENCE_FILE"
            git diff --stat "origin/master..origin/$BEST_BRANCH" 2>/dev/null | tail -40 >> "$EVIDENCE_FILE"
            echo '```' >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"

            echo "### Key diffs (per-file, max 50 lines each)" >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"
            # Show per-file diffs so truncation doesn't hide later files
            git diff --name-only "origin/master..origin/$BEST_BRANCH" 2>/dev/null | while read -r DIFF_FILE; do
              [ -z "$DIFF_FILE" ] && continue
              echo "<details><summary>$DIFF_FILE</summary>" >> "$EVIDENCE_FILE"
              echo "" >> "$EVIDENCE_FILE"
              echo '```diff' >> "$EVIDENCE_FILE"
              git diff "origin/master..origin/$BEST_BRANCH" -- "$DIFF_FILE" 2>/dev/null | head -50 >> "$EVIDENCE_FILE"
              echo '```' >> "$EVIDENCE_FILE"
              echo "</details>" >> "$EVIDENCE_FILE"
              echo "" >> "$EVIDENCE_FILE"
            done

            # Save for later steps (checkout + test)
            echo "WORK_BRANCH=$BEST_BRANCH" >> $GITHUB_ENV
          else
            echo "## Work Branch Analysis" >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"
            echo "No work branch found with commits ahead of master." >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"
          fi

          # ── Related PRs ──
          echo "## Related PRs" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          gh pr list --repo "$REPO" --state all --json number,headRefName,state,title,url \
            -q ".[] | select(.headRefName | test(\"issue-${ISSUE_NUM}($|-)\"))" 2>/dev/null | \
            jq -r '"- [#\(.number)](\(.url)) (\(.state)): \(.title) [\`\(.headRefName)\`]"' >> "$EVIDENCE_FILE" 2>/dev/null \
            || echo "(no related PRs found)" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # ── Failed workflow runs ──
          echo "## Failed Workflow Runs" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # Collect run IDs: from input + auto-discovered
          RUN_IDS=""

          # From input
          if [ -n "$FAILED_RUN_IDS" ]; then
            RUN_IDS="$FAILED_RUN_IDS"
          fi

          # Auto-discover: recent verify-merge runs for this issue
          VM_RUNS=$(gh run list --repo "$REPO" --workflow verify-merge.yml \
            --json databaseId,displayTitle,conclusion,status,createdAt \
            -q "[.[] | select(.displayTitle | contains(\"#${ISSUE_NUM}\"))] | sort_by(.createdAt) | last(6) | .[].databaseId" \
            2>/dev/null || true)

          for RID in $VM_RUNS; do
            if ! echo "$RUN_IDS" | grep -qw "$RID" 2>/dev/null; then
              RUN_IDS="${RUN_IDS:+$RUN_IDS,}$RID"
            fi
          done

          # Auto-discover: recent claude.yml runs for this issue
          CLAUDE_RUNS=$(gh run list --repo "$REPO" --workflow claude.yml \
            --json databaseId,displayTitle,conclusion \
            -q "[.[] | select(.displayTitle | contains(\"#${ISSUE_NUM}\"))] | last(3) | .[].databaseId" \
            2>/dev/null || true)

          for RID in $CLAUDE_RUNS; do
            if ! echo "$RUN_IDS" | grep -qw "$RID" 2>/dev/null; then
              RUN_IDS="${RUN_IDS:+$RUN_IDS,}$RID"
            fi
          done

          # Fetch details + logs for each run
          echo "$RUN_IDS" | tr ',' '\n' | while read -r RUN_ID; do
            [ -z "$RUN_ID" ] && continue

            RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
            RUN_DATA=$(gh run view "$RUN_ID" --repo "$REPO" --json name,displayTitle,conclusion,status,createdAt,updatedAt 2>/dev/null || echo "{}")
            RUN_NAME=$(echo "$RUN_DATA" | jq -r '.name // "unknown"')
            RUN_TITLE=$(echo "$RUN_DATA" | jq -r '.displayTitle // "unknown"')
            RUN_CONCLUSION=$(echo "$RUN_DATA" | jq -r '.conclusion // .status // "unknown"')
            RUN_CREATED=$(echo "$RUN_DATA" | jq -r '.createdAt // "?"')

            echo "### [${RUN_NAME}: ${RUN_TITLE}](${RUN_URL})" >> "$EVIDENCE_FILE"
            echo "- **Conclusion:** $RUN_CONCLUSION" >> "$EVIDENCE_FILE"
            echo "- **Created:** $RUN_CREATED" >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"

            # Get failed job logs (truncated to avoid overwhelming context)
            FAILED_LOG=$(gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>/dev/null | tail -100 || echo "(no failed logs)")
            if [ -n "$FAILED_LOG" ] && [ "$FAILED_LOG" != "(no failed logs)" ]; then
              echo "<details><summary>Failed logs (last 100 lines)</summary>" >> "$EVIDENCE_FILE"
              echo "" >> "$EVIDENCE_FILE"
              echo '```' >> "$EVIDENCE_FILE"
              echo "$FAILED_LOG" >> "$EVIDENCE_FILE"
              echo '```' >> "$EVIDENCE_FILE"
              echo "</details>" >> "$EVIDENCE_FILE"
            else
              echo "_No failed logs (run may have succeeded or logs expired)_" >> "$EVIDENCE_FILE"
            fi
            echo "" >> "$EVIDENCE_FILE"
          done

          # ── Workflow YAML files ──
          echo "## Pipeline Workflow Files" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"
          echo "These are the current workflow files on master. The doctor should check if any of these have bugs causing the failures." >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          for WF in verify-merge.yml claude.yml watcher.yml; do
            if [ -f ".github/workflows/$WF" ]; then
              echo "<details><summary>${WF}</summary>" >> "$EVIDENCE_FILE"
              echo "" >> "$EVIDENCE_FILE"
              echo '```yaml' >> "$EVIDENCE_FILE"
              cat ".github/workflows/$WF" >> "$EVIDENCE_FILE"
              echo '```' >> "$EVIDENCE_FILE"
              echo "</details>" >> "$EVIDENCE_FILE"
              echo "" >> "$EVIDENCE_FILE"
            fi
          done

          # ── Previous doctor runs for this issue ──
          echo "## Previous Doctor Runs" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          PREV_DOCTOR_RUNS=$(gh run list --repo "$REPO" --workflow pipeline-doctor.yml \
            --json databaseId,displayTitle,conclusion,createdAt \
            -q "[.[] | select(.displayTitle | contains(\"#${ISSUE_NUM}\"))] | sort_by(.createdAt) | .[]" \
            2>/dev/null || echo "")

          if [ -n "$PREV_DOCTOR_RUNS" ]; then
            echo "Previous doctor runs found for this issue. If this is a repeat diagnosis, you MUST try a DIFFERENT approach." >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"

            echo "$PREV_DOCTOR_RUNS" | jq -r '"- Run \(.databaseId) (\(.conclusion // "unknown")): \(.createdAt)"' >> "$EVIDENCE_FILE" 2>/dev/null || true

            # Fetch logs from the most recent previous doctor run
            PREV_DOCTOR_ID=$(echo "$PREV_DOCTOR_RUNS" | jq -r 'select(.databaseId != ${{ github.run_id }}) | .databaseId' 2>/dev/null | tail -1 || true)
            if [ -n "$PREV_DOCTOR_ID" ] && [ "$PREV_DOCTOR_ID" != "null" ]; then
              echo "" >> "$EVIDENCE_FILE"
              echo "### Previous doctor run logs (run $PREV_DOCTOR_ID)" >> "$EVIDENCE_FILE"
              echo "<details><summary>Last 150 lines of previous doctor run</summary>" >> "$EVIDENCE_FILE"
              echo "" >> "$EVIDENCE_FILE"
              echo '```' >> "$EVIDENCE_FILE"
              gh run view "$PREV_DOCTOR_ID" --repo "$REPO" --log 2>/dev/null | tail -150 >> "$EVIDENCE_FILE" || echo "(logs unavailable)" >> "$EVIDENCE_FILE"
              echo '```' >> "$EVIDENCE_FILE"
              echo "</details>" >> "$EVIDENCE_FILE"
            fi
          else
            echo "No previous doctor runs found for this issue — this is the first diagnosis." >> "$EVIDENCE_FILE"
          fi
          echo "" >> "$EVIDENCE_FILE"

          # ── Previous doctor diagnostic issues ──
          echo "## Previous Diagnostic Issues" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          PREV_DIAGNOSES=$(gh issue list --repo "$REPO" --label "pipeline-diagnosis" --state all \
            --json number,title,state,url \
            -q '.[] | "- [\(.title)](\(.url)) (\(.state))"' 2>/dev/null || echo "(none)")
          echo "$PREV_DIAGNOSES" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # ── Known bug patterns (from memory) ──
          echo "## Known Pipeline Bug Patterns" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"
          cat >> "$EVIDENCE_FILE" << 'PATTERNS'
          These are patterns from previous pipeline bugs. Check if the current failure matches any:

          1. **Missing allowedTools**: Claude's fix job couldn't run git commands (fetch, merge, checkout, rebase) because they weren't in allowedTools. Symptom: "Claude produced no changes" across all attempts.
          2. **Merge conflict + no git tools**: verify-merge detects conflict, sets MERGE_CONFLICT=true, tells Claude to resolve, but Claude can't run `git fetch`/`git merge`.
          3. **Watcher can't detect active runs**: `gh api .inputs.issue_number` returns null for workflow_dispatch runs. Must parse displayTitle instead.
          4. **Snapshot files in CI**: `jest --ci` won't auto-create .snap files. Tests with `toMatchSnapshot()` always fail in CI.
          5. **Silent failures from || true**: `git pull --rebase ... 2>/dev/null || true` swallows real errors, making pushes silently fail.
          6. **Duplicate chains**: Watcher retriggers stories that already have active verify-merge runs because it can't detect them.
          7. **Native deps on Ubuntu**: `pod install` can't run on Ubuntu CI. Native packages need lazy/optional imports.
          8. **Stale test assertions after intentional code changes**: Code was changed on purpose (e.g., fixing a URL, renaming a field) but existing tests still assert the OLD value. The fix job sees "expected A, got B" but can't tell if the code or test is wrong without knowing the commit intent. Fix: update the test assertions to match the new code. This is the #1 cause of "Claude produced no changes" across all fix attempts.
          PATTERNS
          echo "" >> "$EVIDENCE_FILE"

          # Save evidence path for next step
          echo "evidence_file=$EVIDENCE_FILE" >> $GITHUB_OUTPUT

          # Print summary
          LINE_COUNT=$(wc -l < "$EVIDENCE_FILE")
          echo "Evidence collected: $LINE_COUNT lines"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Reproduce failures on work branch
        if: env.WORK_BRANCH != ''
        env:
          EVIDENCE_FILE: ${{ steps.evidence.outputs.evidence_file }}
        run: |
          echo "## Reproduced Test Failures" >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"
          echo "Checked out \`$WORK_BRANCH\`, merged master, and ran checks to capture actual error output." >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # Check out work branch to reproduce
          git checkout "origin/$WORK_BRANCH" --detach
          git merge origin/master --no-edit 2>/dev/null || {
            echo "**Merge conflict with master** — this may be the root cause." >> "$EVIDENCE_FILE"
            git merge --abort
          }

          # Reinstall deps on the work branch (package.json may differ)
          pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-frozen-lockfile 2>/dev/null || true

          # Run typecheck and capture
          echo "### Typecheck output" >> "$EVIDENCE_FILE"
          echo '```' >> "$EVIDENCE_FILE"
          pnpm typecheck 2>&1 | grep -E "error TS|Found" | head -30 >> "$EVIDENCE_FILE" || echo "(typecheck passed)" >> "$EVIDENCE_FILE"
          echo '```' >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # Run tests and capture FULL failure details (not just FAIL lines)
          # Save full test output so Claude can read the raw file for more context
          pnpm test > /tmp/full_test_output.txt 2>&1 || true

          echo "### Test failure details" >> "$EVIDENCE_FILE"
          echo '```' >> "$EVIDENCE_FILE"
          grep -E "FAIL |● |Expected|Received|expect\(|toBe\(|at Object|\.test\." /tmp/full_test_output.txt | grep -v "● Console" | head -60 >> "$EVIDENCE_FILE" || echo "(tests passed)" >> "$EVIDENCE_FILE"
          echo '```' >> "$EVIDENCE_FILE"
          echo "" >> "$EVIDENCE_FILE"

          # Include the failing test file paths so Claude can read them
          FAILING_TEST_FILES=$(grep -E "^FAIL " /tmp/full_test_output.txt | sed 's/^FAIL //' | head -10 || true)
          if [ -n "$FAILING_TEST_FILES" ]; then
            echo "### Failing test file contents" >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"
            echo "These are the test files that fail. Compare their assertions against the commit diffs above." >> "$EVIDENCE_FILE"
            echo "" >> "$EVIDENCE_FILE"
            echo "$FAILING_TEST_FILES" | while read -r TEST_FILE; do
              [ -z "$TEST_FILE" ] && continue
              # Trim whitespace
              TEST_FILE=$(echo "$TEST_FILE" | xargs)
              if [ -f "$TEST_FILE" ]; then
                echo "<details><summary>$TEST_FILE</summary>" >> "$EVIDENCE_FILE"
                echo "" >> "$EVIDENCE_FILE"
                echo '```typescript' >> "$EVIDENCE_FILE"
                cat "$TEST_FILE" >> "$EVIDENCE_FILE"
                echo '```' >> "$EVIDENCE_FILE"
                echo "</details>" >> "$EVIDENCE_FILE"
                echo "" >> "$EVIDENCE_FILE"
              fi
            done
          fi

          # Switch back to master for Claude to work from
          git checkout master

      - name: Claude diagnose and fix
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          prompt: |
            You are the Pipeline Doctor. Your job is to diagnose why the autonomous pipeline failed for issue #${{ inputs.issue_number }} and fix it.

            **Trigger source:** ${{ inputs.trigger_source }}

            **Evidence file:** Read /tmp/pipeline-doctor-evidence.md for full context including:
            - Issue details and timeline
            - Related branches and PRs (with GitHub links)
            - **Work branch commit history and diffs** (what was intentionally changed)
            - **Reproduced test failures** with Expected/Received values
            - Failed workflow run logs
            - Previous doctor run logs (if this is a repeat — you MUST try something different)
            - Current workflow YAML files
            - Known bug patterns from previous fixes

            **Your task:**

            1. READ the evidence file COMPLETELY. Understand the full picture before acting.

            2. DIAGNOSE the root cause. Key analysis steps:
               - **Read the commit log** on the work branch to understand INTENT — what the developer was trying to do
               - **Compare test expectations vs code changes** — if a test expects value A but the code now returns value B, check if the code change was intentional (update the test) or a bug (fix the code)
               - **Read the actual Expected/Received lines** in test failures, not just the test name
               - Look for patterns in failed logs (same error across attempts = the fix job can't resolve it)
               - Check if the fix job had the right tools (allowedTools) and context
               - Whether this is a CODE bug (tests need updating to match intentional changes), a TEST bug (tests assert stale values), or a PIPELINE bug (workflow infrastructure is broken)

            3. ACT based on diagnosis:

               **If tests assert stale values after intentional code changes:**
               - This is the most common pattern. Check out the work branch, update the test assertions to match the new code, verify with `pnpm test`, push, and retrigger verify-merge.

               **If it's a PIPELINE bug** (workflow YAML, CI config, tooling issue):
               - Create a fix branch: `git checkout -b fix/pipeline-doctor-${{ inputs.issue_number }}`
               - Fix the workflow files
               - Run `pnpm typecheck` if you changed any .ts/.tsx files
               - Git add, commit, push
               - Create a PR with title "fix: [pipeline doctor] <description>" and body including diagnosis, links to failed runs, what was fixed and why

               **If it's a CODE bug** (the story's implementation has real errors):
               - Check out the story's work branch (the one with most commits ahead of master)
               - Fix the code errors identified in the test output
               - Run `pnpm typecheck && pnpm test` to verify
               - Push the fixes
               - Retrigger verify-merge: `gh workflow run verify-merge.yml --repo ${{ github.repository }} --ref master -f tmp_branch="<branch>" -f target_branch="claude/issue-${{ inputs.issue_number }}" -f issue_number="${{ inputs.issue_number }}" -f attempt="1"`

               **If you can't determine the cause or can't fix it:**
               - Create a diagnostic issue with label "pipeline-diagnosis" containing full diagnosis, links to all failed runs, what you tried, and recommended manual steps

            4. **If this is a repeat doctor run**, check what the previous run did (or failed to do) in the evidence. Do NOT repeat the same approach. Escalate — try fixing the code directly instead of just diagnosing, or create a more detailed diagnostic issue.

            5. POST a summary comment on issue #${{ inputs.issue_number }}:
               ```
               **Pipeline Doctor Diagnosis**

               **Trigger:** <what triggered this>
               **Failed runs:** [run 1](link), [run 2](link), ...
               **Root cause:** <one-line summary>
               **Action taken:** <PR created / code fixed / diagnostic issue opened>
               **Status:** <fixed / needs manual intervention>
               ```

            IMPORTANT: Always include GitHub links in your comments and issues so everything is traceable.
            CRITICAL: Push after each milestone. If this job times out, unpushed work is lost.
            Push command: `git push origin HEAD`

            NOTE: You start on the master branch. To fix code on the work branch, run:
            `git fetch origin && git checkout origin/<work_branch> --detach`
            The work branch name is in the evidence file under "Work Branch Analysis".
            After fixing, push with: `git push origin HEAD:refs/heads/<work_branch>`
            Full test output is at /tmp/full_test_output.txt if you need more detail than the evidence summary.
          show_full_output: true
          settings: |
            {
              "maxTurns": 30,
              "allowedTools": [
                "Edit", "MultiEdit", "Glob", "Grep", "LS", "Read", "Write",
                "Bash(*)"
              ]
            }
