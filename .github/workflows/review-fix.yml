name: Fix Review Feedback
run-name: "Review fix: PR #${{ inputs.pr_number }} (round ${{ inputs.round }})"

# Runs Claude with full permissions to fix code review feedback on a PR.
# Triggered by review-relay via workflow_dispatch instead of @claude PR comment,
# because claude-code-action@v1 restricts tools (no Edit/Write) in PR comment context.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
        type: string
      pr_branch:
        description: 'PR head branch name'
        required: true
        type: string
      review_summary:
        description: 'Review feedback to address'
        required: true
        type: string
      reviewer:
        description: 'Reviewer username'
        required: false
        type: string
        default: 'bot'
      round:
        description: 'Review round (1-3)'
        required: false
        type: string
        default: '1'

concurrency:
  group: review-fix-${{ inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.pr_branch }}
          fetch-depth: 0

      - name: Configure git and auth
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Run Claude to fix review feedback
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          prompt: |
            Fix code review feedback on PR #${{ inputs.pr_number }} (review round ${{ inputs.round }}/3, reviewer: ${{ inputs.reviewer }}).

            HERE IS THE REVIEW FEEDBACK TO ADDRESS:
            ${{ inputs.review_summary }}

            INSTRUCTIONS:
            1. Read each review comment carefully
            2. If the feedback is valid, fix the code using the Edit tool
            3. If the feedback is incorrect or not applicable, reply on the PR explaining why
            4. After fixing, run `pnpm typecheck` and `pnpm test` to verify no regressions
            5. Git add, commit, and push your changes

            Push command: git push origin HEAD
          show_full_output: true
          claude_args: --allowedTools "Edit" "MultiEdit" "Glob" "Grep" "LS" "Read" "Write" "Bash(*)"
          settings: |
            {
              "maxTurns": 20
            }

      - name: Verify fixes pass checks
        id: verify
        run: |
          echo "=== Typecheck ==="
          if ! pnpm typecheck 2>&1; then
            echo "::error::Typecheck failed after review fix — not pushing"
            echo "pass=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "=== Tests ==="
          if ! pnpm test 2>&1; then
            echo "::error::Tests failed after review fix — not pushing"
            echo "pass=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "pass=true" >> $GITHUB_OUTPUT

      - name: Comment failure on PR
        if: steps.verify.outputs.pass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "${{ inputs.pr_number }}" --repo "${{ github.repository }}" \
            --body "Review fix round ${{ inputs.round }}/3 failed verification (typecheck or tests). Changes were NOT pushed. [View run]($RUN_URL)" \
            2>/dev/null || echo "Failed to post comment"
          exit 1

      # Resolve threads BEFORE pushing so that when the push triggers
      # auto-merge.yml (via pull_request: synchronize), threads are
      # already resolved and the merge gate passes.
      - name: Resolve review threads
        if: steps.verify.outputs.pass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUM=${{ inputs.pr_number }}
          OWNER=$(echo "$REPO" | cut -d/ -f1)
          NAME=$(echo "$REPO" | cut -d/ -f2)

          echo "Resolving review threads on PR #$PR_NUM"

          THREAD_IDS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  reviewThreads(first: 100) {
                    nodes { id isResolved }
                  }
                }
              }
            }
          " --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .id' 2>/dev/null || echo "")

          if [ -z "$THREAD_IDS" ]; then
            echo "No unresolved review threads"
            exit 0
          fi

          echo "$THREAD_IDS" | while read -r TID; do
            if [ -n "$TID" ]; then
              gh api graphql -f query="
                mutation {
                  resolveReviewThread(input: {threadId: \"$TID\"}) {
                    thread { isResolved }
                  }
                }
              " 2>/dev/null && echo "Resolved thread $TID" || echo "Failed to resolve $TID"
            fi
          done

          echo "Resolved all review threads on PR #$PR_NUM"

      - name: Push verified changes
        if: steps.verify.outputs.pass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Commit any uncommitted changes
          CHANGES=$(git status --porcelain | grep -v '^?? output.txt$' || true)
          if [ -n "$CHANGES" ]; then
            git add -u
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "fix: address review feedback (round ${{ inputs.round }})

          Co-authored-by: Claude <noreply@anthropic.com>"
            fi
          fi

          # Push if we have new commits
          git fetch origin "${{ inputs.pr_branch }}" 2>/dev/null || true
          LOCAL_HEAD=$(git rev-parse HEAD)
          REMOTE_HEAD=$(git rev-parse "origin/${{ inputs.pr_branch }}" 2>/dev/null || echo "none")

          if [ "$LOCAL_HEAD" = "$REMOTE_HEAD" ]; then
            echo "No new changes to push"
          else
            git pull --rebase origin "${{ inputs.pr_branch }}" 2>/dev/null || true
            git push origin "HEAD:${{ inputs.pr_branch }}"
            echo "Pushed review fixes to ${{ inputs.pr_branch }}"
          fi

      - name: Comment on PR
        if: steps.verify.outputs.pass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh pr comment "${{ inputs.pr_number }}" --repo "${{ github.repository }}" \
            --body "Review fix round ${{ inputs.round }}/3 complete (verified: typecheck + tests pass). Review threads resolved. [View run]($RUN_URL)" \
            2>/dev/null || echo "Failed to post comment"
