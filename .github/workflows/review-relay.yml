name: Relay Code Reviews to Claude

# When a bot reviewer (Gemini/Copilot) leaves comments on a PR,
# dispatches review-fix.yml to fix them with full Claude permissions.
# Cycles until resolved or safety limit (3 rounds) is reached.
#
# Previously posted @claude PR comments, but claude-code-action@v1
# restricts tools (no Edit/Write) in PR comment context. Now dispatches
# a workflow_dispatch instead, which gives Claude full tool access.

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: read
  actions: write

jobs:
  relay-review:
    if: >-
      github.event.review.state == 'changes_requested' ||
      github.event.review.state == 'commented'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check reviewer and relay count
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}

          # Skip merged/closed PRs — nothing to fix
          PR_STATE=$(gh pr view "$PR_NUM" --repo ${{ github.repository }} --json state -q '.state')
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR #$PR_NUM is $PR_STATE — skipping relay"
            echo "should_relay=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Only relay bot reviews — add your bot reviewers here
          BOTS="gemini-code-assist[bot] copilot[bot]"
          IS_BOT=false
          for bot in $BOTS; do
            if [ "$REVIEWER" = "$bot" ]; then
              IS_BOT=true
              break
            fi
          done

          if [ "$IS_BOT" = "false" ]; then
            echo "Review from $REVIEWER (not a bot reviewer) — skipping"
            echo "should_relay=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count previous relay rounds by checking review-fix workflow runs for this PR
          RELAY_COUNT=$(gh run list --repo "${{ github.repository }}" --workflow review-fix.yml \
            --json displayTitle \
            -q "[.[] | select(.displayTitle | contains(\"PR #${PR_NUM}\"))] | length" \
            2>/dev/null || echo "0")

          echo "Relay count so far: $RELAY_COUNT"

          if [ "$RELAY_COUNT" -ge 3 ]; then
            echo "Hit relay limit (3). Leaving comment for human review."
            echo "should_relay=false" >> $GITHUB_OUTPUT
            gh pr comment "$PR_NUM" --repo ${{ github.repository }} \
              --body "Review relay limit reached (3 rounds). Claude and the reviewer could not fully resolve the feedback. A human should review the remaining comments."
            exit 0
          fi

          echo "should_relay=true" >> $GITHUB_OUTPUT
          echo "relay_round=$((RELAY_COUNT + 1))" >> $GITHUB_OUTPUT

      - name: Collect review comments
        if: steps.check.outputs.should_relay == 'true'
        id: comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REVIEWER="${{ github.event.review.user.login }}"

          COMMENTS=$(gh api \
            "repos/${{ github.repository }}/pulls/${PR_NUM}/comments" \
            --jq "[.[] | select(.user.login == \"${REVIEWER}\") | {path: .path, body: .body, line: .line, id: .id, node_id: .node_id}]")

          COUNT=$(echo "$COMMENTS" | jq 'length')
          echo "Found $COUNT inline comments from $REVIEWER"

          # Build the review summary
          SUMMARY=""
          if [ "$COUNT" -gt 0 ]; then
            SUMMARY=$(echo "$COMMENTS" | jq -r '.[] | "- **\(.path)** (line \(.line // "N/A")): \(.body)"' | head -15)
          fi

          if [ -n "$REVIEW_BODY" ]; then
            SUMMARY="General feedback: ${REVIEW_BODY}

          ${SUMMARY}"
          fi

          if [ -z "$SUMMARY" ]; then
            echo "No review comments or body to relay"
            echo "has_feedback=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_feedback=true" >> $GITHUB_OUTPUT

          # Save summary for the dispatch step (escape for GitHub output)
          # Truncate to 60000 chars to stay within workflow_dispatch input limits
          TRUNCATED=$(echo "$SUMMARY" | head -100 | cut -c1-60000)
          echo "summary<<EOFSUMMARY" >> $GITHUB_OUTPUT
          echo "$TRUNCATED" >> $GITHUB_OUTPUT
          echo "EOFSUMMARY" >> $GITHUB_OUTPUT

      - name: Dispatch review-fix workflow
        if: steps.check.outputs.should_relay == 'true' && steps.comments.outputs.has_feedback == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          REVIEWER="${{ github.event.review.user.login }}"
          ROUND=${{ steps.check.outputs.relay_round }}
          SUMMARY="${{ steps.comments.outputs.summary }}"

          gh workflow run review-fix.yml \
            --repo "${{ github.repository }}" \
            --ref "$PR_BRANCH" \
            -f pr_number="$PR_NUM" \
            -f pr_branch="$PR_BRANCH" \
            -f review_summary="$SUMMARY" \
            -f reviewer="$REVIEWER" \
            -f round="$ROUND"

          echo "Dispatched review-fix.yml for PR #$PR_NUM (round $ROUND)"

          # Post a status comment on the PR
          RUN_URL="https://github.com/${{ github.repository }}/actions/workflows/review-fix.yml"
          gh pr comment "$PR_NUM" --repo "${{ github.repository }}" \
            --body "Review feedback from $REVIEWER detected (round $ROUND/3). [Dispatched review-fix workflow]($RUN_URL) to address it." \
            2>/dev/null || true
