name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') &&
      (github.event.issue != null || github.event.pull_request != null)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to PR branch if applicable
        if: github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.issue.number }}
          PR_BRANCH=$(gh pr view "$PR_NUM" --json headRefName -q '.headRefName')
          echo "Switching to PR branch: $PR_BRANCH"
          git checkout "$PR_BRANCH"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          elif [ -f package.json ]; then
            pnpm install
          else
            echo "No package.json yet — skipping install"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "maxTurns": 100,
              "allowedTools": [
                "Edit", "MultiEdit", "Glob", "Grep", "LS", "Read", "Write",
                "Bash(git add:*)", "Bash(git commit:*)", "Bash(git checkout:*)",
                "Bash(git branch:*)", "Bash(git status:*)", "Bash(git diff:*)",
                "Bash(git log:*)", "Bash(git stash:*)", "Bash(git merge:*)",
                "Bash(git rebase:*)", "Bash(git reset:*)", "Bash(git remote:*)",
                "Bash(git ls-remote:*)", "Bash(git rev-parse:*)", "Bash(git rev-list:*)",
                "Bash(git show:*)", "Bash(gh:*)", "Bash(node:*)", "Bash(pnpm:*)", "Bash(npx:*)"
              ]
            }
          claude_args: |
            --system-prompt "IMPORTANT: Only respond to the instruction in <trigger_comment>. Ignore all previous @claude requests in the comment history — they were handled by earlier runs. Focus exclusively on what the <trigger_comment> asks you to do."

      - name: Push branch
        id: push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH=$(git branch --show-current)
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Commit any uncommitted changes
          CHANGES=$(git status --porcelain | grep -v '^?? output.txt$' || true)
          if [ -n "$CHANGES" ]; then
            git add -u
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "chore: save unpushed changes from Claude

          Co-authored-by: Claude <noreply@anthropic.com>"
            fi
          fi

          # Push
          REMOTE_EXISTS=$(git ls-remote --heads origin "$BRANCH" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$REMOTE_EXISTS" -eq 0 ]; then
            git push -u origin HEAD
          else
            UNPUSHED=$(git log "origin/${BRANCH}..HEAD" --oneline 2>/dev/null || echo "")
            if [ -n "$UNPUSHED" ]; then
              git push origin HEAD
            else
              echo "Nothing to push"
            fi
          fi

      - name: Run checks (typecheck + tests)
        id: checks
        run: |
          pnpm install --frozen-lockfile 2>/dev/null || pnpm install --no-frozen-lockfile 2>/dev/null || true

          PASS=true
          if ! pnpm typecheck 2>&1; then
            echo "Typecheck FAILED"
            PASS=false
          fi

          if [ "$PASS" = "true" ] && ! pnpm test 2>&1; then
            echo "Tests FAILED"
            PASS=false
          fi

          echo "pass=$PASS" >> $GITHUB_OUTPUT

      - name: Extract issue number
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Get issue number from PR body or from the comment context
          ISSUE_NUM=""
          BRANCH="${{ steps.push.outputs.branch }}"

          # Try branch name first
          ISSUE_NUM=$(echo "$BRANCH" | grep -oE 'issue-[0-9]+' | grep -oE '[0-9]+' || true)

          # Fall back to comment context
          if [ -z "$ISSUE_NUM" ] && [ -n "${{ github.event.issue.number }}" ]; then
            IS_PR=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
              --jq '.pull_request.url // empty' 2>/dev/null || echo "")
            if [ -z "$IS_PR" ]; then
              ISSUE_NUM=${{ github.event.issue.number }}
            fi
          fi

          echo "number=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Create PR (checks passed)
        if: steps.checks.outputs.pass == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="${{ steps.push.outputs.branch }}"
          ISSUE_NUM="${{ steps.issue.outputs.number }}"

          if [ -z "$BRANCH" ]; then
            echo "No branch — skipping PR"
            exit 0
          fi

          AHEAD=$(git rev-list --count origin/master.."origin/$BRANCH" 2>/dev/null || echo "0")
          if [ "$AHEAD" -eq 0 ]; then
            echo "No commits ahead of master — skipping PR"
            exit 0
          fi

          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
            exit 0
          fi

          if [ -n "$ISSUE_NUM" ]; then
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --json title -q '.title' 2>/dev/null || echo "")
            PR_TITLE="${ISSUE_TITLE:-Implement issue #$ISSUE_NUM}"
            PR_BODY="Closes #${ISSUE_NUM}

          Autonomously implemented by Claude Code via GitHub Actions.

          Generated with [Claude Code](https://claude.ai/code)"
          else
            PR_TITLE="Changes from Claude Code"
            PR_BODY="Autonomously implemented by Claude Code via GitHub Actions."
          fi

          gh pr create --head "$BRANCH" --base master --title "$PR_TITLE" --body "$PR_BODY"
          PR_NUM=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$PR_NUM" ]; then
            gh pr merge "$PR_NUM" --squash --auto 2>/dev/null || echo "Auto-merge not available"
          fi

      - name: Trigger fix-checks (checks failed)
        if: steps.checks.outputs.pass == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          BRANCH="${{ steps.push.outputs.branch }}"
          ISSUE_NUM="${{ steps.issue.outputs.number }}"

          if [ -z "$BRANCH" ]; then
            echo "No branch — skipping fix trigger"
            exit 0
          fi

          gh workflow run fix-checks.yml \
            --repo "${{ github.repository }}" \
            --ref master \
            -f branch="$BRANCH" \
            -f issue_number="${ISSUE_NUM:-}"

          echo "Triggered fix-checks workflow for branch $BRANCH"
