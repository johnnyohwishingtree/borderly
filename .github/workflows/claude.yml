name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.type != 'Bot' &&
      (github.event.issue != null || github.event.pull_request != null)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or switch to working branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          if [ -n "${{ github.event.issue.pull_request }}" ]; then
            # PR context — switch to the existing PR branch
            PR_NUM=${{ github.event.issue.number }}
            PR_BRANCH=$(gh pr view "$PR_NUM" --json headRefName -q '.headRefName')
            echo "Switching to PR branch: $PR_BRANCH"
            git checkout "$PR_BRANCH"
          else
            # Issue context — create a dedicated branch for this work
            ISSUE_NUM=${{ github.event.issue.number }}
            BRANCH="claude/issue-${ISSUE_NUM}"

            # Check if the branch already exists on remote
            if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
              echo "Branch $BRANCH already exists — checking out"
              git checkout "$BRANCH"
            else
              echo "Creating new branch: $BRANCH"
              git checkout -b "$BRANCH"
              git push -u origin "$BRANCH"
            fi
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          elif [ -f package.json ]; then
            pnpm install
          else
            echo "No package.json yet — skipping install"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "maxTurns": 100,
              "allowedTools": [
                "Edit", "MultiEdit", "Glob", "Grep", "LS", "Read", "Write",
                "Bash(git add:*)", "Bash(git commit:*)", "Bash(git checkout:*)",
                "Bash(git branch:*)", "Bash(git status:*)", "Bash(git diff:*)",
                "Bash(git log:*)", "Bash(git stash:*)", "Bash(git merge:*)",
                "Bash(git rebase:*)", "Bash(git reset:*)", "Bash(git remote:*)",
                "Bash(git ls-remote:*)", "Bash(git rev-parse:*)", "Bash(git rev-list:*)",
                "Bash(git show:*)", "Bash(gh:*)", "Bash(node:*)", "Bash(pnpm:*)", "Bash(npx:*)"
              ]
            }
          claude_args: |
            --system-prompt "IMPORTANT: Only respond to the instruction in <trigger_comment>. Ignore all previous @claude requests in the comment history — they were handled by earlier runs. Focus exclusively on what the <trigger_comment> asks you to do."

      - name: Push to temporary branch
        id: push
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Remember the source branch (where Claude's work lives)
          SOURCE_BRANCH=$(git branch --show-current)
          echo "source_branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT

          # Commit any uncommitted changes
          CHANGES=$(git status --porcelain | grep -v '^?? output.txt$' || true)
          if [ -n "$CHANGES" ]; then
            git add -u
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "chore: save unpushed changes from Claude

          Co-authored-by: Claude <noreply@anthropic.com>"
            fi
          fi

          # Create temp branch and push
          TMP_BRANCH="tmp/claude-${{ github.run_id }}"
          echo "tmp_branch=$TMP_BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$TMP_BRANCH"
          git push -u origin "$TMP_BRANCH"
          echo "Pushed to $TMP_BRANCH"

      - name: Resolve bot review threads
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUM=""
          if [ -n "${{ github.event.issue.number }}" ]; then
            HAS_PR=$(gh api "repos/$REPO/issues/${{ github.event.issue.number }}" \
              --jq '.pull_request.url // empty' 2>/dev/null || echo "")
            if [ -n "$HAS_PR" ]; then
              PR_NUM=${{ github.event.issue.number }}
            fi
          fi

          if [ -z "$PR_NUM" ]; then
            echo "Not a PR context — skipping thread resolution"
            exit 0
          fi

          echo "Resolving review threads on PR #$PR_NUM"
          OWNER=$(echo "$REPO" | cut -d/ -f1)
          NAME=$(echo "$REPO" | cut -d/ -f2)

          THREAD_IDS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  reviewThreads(first: 100) {
                    nodes { id isResolved }
                  }
                }
              }
            }
          " --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .id' 2>/dev/null || echo "")

          if [ -z "$THREAD_IDS" ]; then
            echo "No unresolved review threads"
            exit 0
          fi

          echo "$THREAD_IDS" | while read -r TID; do
            if [ -n "$TID" ]; then
              gh api graphql -f query="
                mutation {
                  resolveReviewThread(input: {threadId: \"$TID\"}) {
                    thread { isResolved }
                  }
                }
              " 2>/dev/null && echo "Resolved thread $TID" || echo "Failed to resolve $TID"
            fi
          done

      - name: Extract issue number
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_NUM=""
          SOURCE="${{ steps.push.outputs.source_branch }}"

          # Try branch name first
          ISSUE_NUM=$(echo "$SOURCE" | grep -oE 'issue-[0-9]+' | grep -oE '[0-9]+' || true)

          # Fall back to comment context
          if [ -z "$ISSUE_NUM" ] && [ -n "${{ github.event.issue.number }}" ]; then
            IS_PR=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}" \
              --jq '.pull_request.url // empty' 2>/dev/null || echo "")
            if [ -z "$IS_PR" ]; then
              ISSUE_NUM=${{ github.event.issue.number }}
            fi
          fi

          echo "number=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Trigger verify-merge
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TMP_BRANCH="${{ steps.push.outputs.tmp_branch }}"
          SOURCE_BRANCH="${{ steps.push.outputs.source_branch }}"
          ISSUE_NUM="${{ steps.issue.outputs.number }}"

          gh workflow run verify-merge.yml \
            --repo "${{ github.repository }}" \
            --ref master \
            -f tmp_branch="$TMP_BRANCH" \
            -f target_branch="$SOURCE_BRANCH" \
            -f issue_number="${ISSUE_NUM:-}" \
            -f attempt="1"

          echo "Triggered verify-merge for $TMP_BRANCH -> $SOURCE_BRANCH"
