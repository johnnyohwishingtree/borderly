name: Claude Code
run-name: "Claude #${{ github.event.issue.number || github.event.pull_request.number }} by ${{ github.event.comment.user.login }}"

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}-${{ github.event.comment.user.login }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.type != 'Bot' &&
      (github.event.issue != null || github.event.pull_request != null)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git and auth
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"

      - name: Switch to PR branch if applicable
        if: github.event.issue.pull_request || github.event.pull_request
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_NUM=${{ github.event.pull_request.number }}
          else
            PR_NUM=${{ github.event.issue.number }}
          fi
          PR_BRANCH=$(gh pr view "$PR_NUM" --json headRefName -q '.headRefName')
          echo "Switching to PR branch: $PR_BRANCH"
          git checkout "$PR_BRANCH"

      - name: Determine push target and create branches
        id: push_target
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${{ github.event.issue.pull_request }}" ] || [ -n "${{ github.event.pull_request }}" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "push_cmd=git push origin HEAD" >> $GITHUB_OUTPUT
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
            PR_BRANCH="claude/issue-${ISSUE_NUM}"
            TMP_BRANCH="tmp/claude-${{ github.run_id }}"

            echo "is_pr=false" >> $GITHUB_OUTPUT
            echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
            echo "tmp_branch=$TMP_BRANCH" >> $GITHUB_OUTPUT
            echo "push_cmd=git push origin HEAD:refs/heads/$TMP_BRANCH" >> $GITHUB_OUTPUT

            # Create both branches on remote from current master HEAD
            git push origin "HEAD:refs/heads/$PR_BRANCH" 2>/dev/null || echo "PR branch $PR_BRANCH already exists"
            git push origin "HEAD:refs/heads/$TMP_BRANCH"
            echo "Created PR branch: $PR_BRANCH, tmp branch: $TMP_BRANCH"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile
          elif [ -f package.json ]; then
            pnpm install
          else
            echo "No package.json yet — skipping install"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "maxTurns": 100,
              "allowedTools": [
                "Edit", "MultiEdit", "Glob", "Grep", "LS", "Read", "Write",
                "Bash(git add:*)", "Bash(git commit:*)", "Bash(git checkout:*)",
                "Bash(git branch:*)", "Bash(git status:*)", "Bash(git diff:*)",
                "Bash(git log:*)", "Bash(git stash:*)", "Bash(git merge:*)",
                "Bash(git rebase:*)", "Bash(git reset:*)", "Bash(git remote:*)",
                "Bash(git ls-remote:*)", "Bash(git rev-parse:*)", "Bash(git rev-list:*)",
                "Bash(git show:*)", "Bash(gh:*)", "Bash(node:*)", "Bash(pnpm:*)", "Bash(npx:*)"
              ]
            }
          claude_args: |
            --system-prompt "IMPORTANT: Only respond to the instruction in <trigger_comment>. Ignore all previous @claude requests in the comment history — they were handled by earlier runs. Focus exclusively on what the <trigger_comment> asks you to do.

            CRITICAL — PUSH AFTER EACH MILESTONE: Whenever you complete a task or check off an acceptance criterion, you MUST immediately git add, git commit, and push before moving on to the next task. Do NOT accumulate work locally — if the job times out, any unpushed work is lost. Use this exact command to push: ${{ steps.push_target.outputs.push_cmd }}

            When asked to fix code review issues: you MUST use the Edit tool to modify files, then git add, git commit, and git push. Posting a comment describing what you would change is NOT sufficient — you must actually make the changes. If you cannot fix an issue, reply on the specific review thread explaining why."

      # ── Rescue step: runs ONLY when the job is cancelled (e.g. timeout) ──
      - name: Rescue work on timeout
        if: cancelled()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number || github.event.pull_request.number }}"
          TMP_BRANCH="tmp/claude-${{ github.run_id }}"

          # Commit any uncommitted work
          git add -A -- ':!output.txt' ':!node_modules'
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "wip: rescue work from timed-out Claude run (#${ISSUE_NUM})

          Job timed out after 60 minutes. This commit saves all in-progress work.

          Co-authored-by: Claude <noreply@anthropic.com>"
          fi

          # Check if there's anything to push
          LOCAL_HEAD=$(git rev-parse HEAD)
          MASTER_HEAD=$(git rev-parse "origin/master" 2>/dev/null || echo "none")

          if [ "$LOCAL_HEAD" = "$MASTER_HEAD" ]; then
            echo "No new commits to rescue — nothing was changed"
            exit 0
          fi

          # Push to the same tmp branch that mid-run pushes use
          git push origin "HEAD:refs/heads/$TMP_BRANCH"
          echo "Rescued work to $TMP_BRANCH"

          # Comment on the issue so the user knows
          COMMIT_COUNT=$(git rev-list --count "origin/master..HEAD" 2>/dev/null || echo "?")
          gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Claude's run timed out after 60 minutes, but the in-progress work was saved to [\`${TMP_BRANCH}\`](https://github.com/${{ github.repository }}/tree/${TMP_BRANCH}) (${COMMIT_COUNT} commits ahead of master).

          To resume, comment on this issue again with: \`@claude Continue the work from the \`${TMP_BRANCH}\` branch. Check out that branch first, then pick up where you left off.\`

          Or manually: \`git fetch origin ${TMP_BRANCH} && git checkout ${TMP_BRANCH}\`
          EOF
          )" 2>/dev/null || echo "Failed to post rescue comment"

      # ── Normal flow (only runs if Claude completed successfully) ──
      - name: Push to PR branch (PR context)
        if: success() && steps.push_target.outputs.is_pr == 'true'
        id: push_pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SOURCE_BRANCH=$(git branch --show-current)
          echo "source_branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT

          # Commit any uncommitted changes
          CHANGES=$(git status --porcelain | grep -v '^?? output.txt$' || true)
          if [ -n "$CHANGES" ]; then
            git add -u
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "chore: save unpushed changes from Claude

          Co-authored-by: Claude <noreply@anthropic.com>"
            fi
          fi

          # Push directly to the PR branch — no verify-merge needed
          git push origin HEAD
          echo "Pushed directly to PR branch $SOURCE_BRANCH"

      - name: Push remaining work to tmp branch (issue context)
        if: success() && steps.push_target.outputs.is_pr == 'false'
        id: push_issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TMP_BRANCH="${{ steps.push_target.outputs.tmp_branch }}"
          PR_BRANCH="${{ steps.push_target.outputs.pr_branch }}"
          echo "tmp_branch=$TMP_BRANCH" >> $GITHUB_OUTPUT
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT

          # Commit any uncommitted changes
          CHANGES=$(git status --porcelain | grep -v '^?? output.txt$' || true)
          if [ -n "$CHANGES" ]; then
            git add -u
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "chore: save unpushed changes from Claude

          Co-authored-by: Claude <noreply@anthropic.com>"
            fi
          fi

          # Push to the same tmp branch Claude has been pushing to mid-run
          git push origin "HEAD:refs/heads/$TMP_BRANCH"
          echo "Pushed remaining work to $TMP_BRANCH"

      - name: Resolve bot review threads
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUM=""
          if [ -n "${{ github.event.issue.number }}" ]; then
            HAS_PR=$(gh api "repos/$REPO/issues/${{ github.event.issue.number }}" \
              --jq '.pull_request.url // empty' 2>/dev/null || echo "")
            if [ -n "$HAS_PR" ]; then
              PR_NUM=${{ github.event.issue.number }}
            fi
          fi

          if [ -z "$PR_NUM" ]; then
            echo "Not a PR context — skipping thread resolution"
            exit 0
          fi

          echo "Resolving review threads on PR #$PR_NUM"
          OWNER=$(echo "$REPO" | cut -d/ -f1)
          NAME=$(echo "$REPO" | cut -d/ -f2)

          THREAD_IDS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  reviewThreads(first: 100) {
                    nodes { id isResolved }
                  }
                }
              }
            }
          " --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .id' 2>/dev/null || echo "")

          if [ -z "$THREAD_IDS" ]; then
            echo "No unresolved review threads"
            exit 0
          fi

          echo "$THREAD_IDS" | while read -r TID; do
            if [ -n "$TID" ]; then
              gh api graphql -f query="
                mutation {
                  resolveReviewThread(input: {threadId: \"$TID\"}) {
                    thread { isResolved }
                  }
                }
              " 2>/dev/null && echo "Resolved thread $TID" || echo "Failed to resolve $TID"
            fi
          done

      - name: Trigger verify-merge (issue context only)
        if: success() && steps.push_target.outputs.is_pr == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TMP_BRANCH="${{ steps.push_issue.outputs.tmp_branch }}"
          PR_BRANCH="${{ steps.push_issue.outputs.pr_branch }}"
          ISSUE_NUM="${{ github.event.issue.number }}"

          gh workflow run verify-merge.yml \
            --repo "${{ github.repository }}" \
            --ref master \
            -f tmp_branch="$TMP_BRANCH" \
            -f target_branch="$PR_BRANCH" \
            -f issue_number="${ISSUE_NUM}" \
            -f attempt="1"

          echo "Triggered verify-merge for $TMP_BRANCH -> $PR_BRANCH"

      - name: Enable auto-merge on PR
        if: success() && steps.push_target.outputs.is_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM=${{ github.event.issue.number }}
          gh pr merge "$PR_NUM" --squash --auto --repo "${{ github.repository }}" 2>/dev/null \
            && echo "Auto-merge enabled on PR #$PR_NUM" \
            || echo "Auto-merge not available for PR #$PR_NUM"
