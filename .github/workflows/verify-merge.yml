name: Verify and Merge
run-name: "Verify #${{ inputs.issue_number }} → ${{ inputs.target_branch }} (attempt ${{ inputs.attempt }}/6)"

# Checks out a temporary branch, runs lint + typecheck + test.
# If all pass: merges into the target branch, cleans up temp branch, creates PR.
# If fail: Claude fixes once (fresh context), pushes, triggers itself again.
# Max 6 attempts to prevent infinite loops.

on:
  workflow_dispatch:
    inputs:
      tmp_branch:
        description: 'Temporary branch with Claude work'
        required: true
        type: string
      target_branch:
        description: 'Target branch to merge into (PR branch)'
        required: true
        type: string
      issue_number:
        description: 'Related issue number'
        required: false
        type: string
      attempt:
        description: 'Current attempt number (1-6)'
        required: false
        type: string
        default: '1'

concurrency:
  group: verify-merge-${{ inputs.tmp_branch }}-attempt-${{ inputs.attempt }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write

jobs:
  link-to-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: inputs.issue_number != ''
    steps:
      - name: Post workflow run link on issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "${{ inputs.issue_number }}" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Verify and Merge — [attempt ${{ inputs.attempt }}/6]($RUN_URL)
          EOF
          )" 2>/dev/null || echo "Failed to post link comment"

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      pass: ${{ steps.checks.outputs.pass }}

    steps:
      - name: Checkout temp branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tmp_branch }}
          fetch-depth: 0

      - name: Merge master into branch
        run: |
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"
          git fetch origin master
          git merge origin/master --no-edit || {
            echo "::warning::Merge conflict with master — fix job will resolve"
            git merge --abort
            echo "MERGE_CONFLICT=true" >> $GITHUB_ENV
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Run checks (lint + typecheck + test)
        id: checks
        run: |
          PASS=true

          if [ "$MERGE_CONFLICT" = "true" ]; then
            echo "Merge conflict with master — cannot run checks"
            echo "pass=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "=== Lint (changed files only) ==="
          CHANGED_FILES=$(git diff --name-only origin/master...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | grep -v node_modules || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Linting $(echo "$CHANGED_FILES" | wc -l | tr -d ' ') changed files"
            if ! echo "$CHANGED_FILES" | xargs npx eslint --quiet 2>&1; then
              echo "Lint FAILED"
              PASS=false
            fi
          else
            echo "No changed JS/TS files to lint"
          fi

          echo "=== Typecheck ==="
          if ! pnpm typecheck 2>&1; then
            echo "Typecheck FAILED"
            PASS=false
          fi

          if [ "$PASS" = "true" ]; then
            echo "=== Metro Bundle ==="
            if ! npx react-native bundle --platform ios --dev false --entry-file index.js --bundle-output /tmp/bundle.js 2>&1; then
              echo "Metro Bundle FAILED"
              PASS=false
            fi
          fi

          if [ "$PASS" = "true" ]; then
            echo "=== Tests ==="
            if ! pnpm test 2>&1; then
              echo "Tests FAILED"
              PASS=false
            fi
          fi

          if [ "$PASS" = "true" ]; then
            echo "=== Native Dependency Check ==="
            MISSING=""
            # Check react-native-* and @react-native-* packages for unlinked native deps
            for pkg in $(node -e "
              const pkg = require('./package.json');
              const deps = { ...pkg.dependencies, ...pkg.devDependencies };
              Object.keys(deps)
                .filter(d => d.startsWith('react-native-') || d.startsWith('@react-native-'))
                .forEach(d => console.log(d));
            "); do
              PKG_DIR="node_modules/$pkg"
              [ ! -d "$PKG_DIR" ] && continue
              # Check if package has native iOS code (podspec or ios/ directory)
              HAS_NATIVE=false
              if ls "$PKG_DIR"/*.podspec 1>/dev/null 2>&1 || [ -d "$PKG_DIR/ios" ]; then
                HAS_NATIVE=true
              fi
              if [ "$HAS_NATIVE" = "true" ]; then
                # Check if it's referenced in Podfile.lock
                if ! grep -q "node_modules/$pkg" ios/Podfile.lock 2>/dev/null; then
                  MISSING="$MISSING $pkg"
                fi
              fi
            done
            if [ -n "$MISSING" ]; then
              echo "Native Dependency Check FAILED"
              echo "The following native packages are in package.json but not linked in ios/Podfile.lock:"
              for m in $MISSING; do echo "  - $m"; done
              echo ""
              echo "Run 'cd ios && pod install' on macOS and commit the updated Podfile.lock."
              PASS=false
            fi
          fi

          echo "pass=$PASS" >> $GITHUB_OUTPUT

  merge:
    needs: verify
    if: needs.verify.outputs.pass == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Merge temp branch into target
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"
          git fetch origin "${{ inputs.tmp_branch }}"

          git merge "origin/${{ inputs.tmp_branch }}" --no-edit

          # Remove fix context log before pushing — it's only for cross-attempt context
          if [ -f .claude-fix-log.md ]; then
            git rm .claude-fix-log.md
            git commit -m "chore: remove fix context log"
          fi

          REMOTE_EXISTS=$(git ls-remote --heads origin "${{ inputs.target_branch }}" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$REMOTE_EXISTS" -eq 0 ]; then
            git push -u origin HEAD
          else
            git push origin HEAD
          fi

          echo "Merged ${{ inputs.tmp_branch }} into ${{ inputs.target_branch }}"

      - name: Delete temp branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/${{ inputs.tmp_branch }}" 2>/dev/null \
            && echo "Deleted ${{ inputs.tmp_branch }}" \
            || echo "Failed to delete ${{ inputs.tmp_branch }}"

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TARGET="${{ inputs.target_branch }}"
          ISSUE_NUM="${{ inputs.issue_number }}"

          EXISTING=$(gh pr list --head "$TARGET" --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $TARGET"
            exit 0
          fi

          AHEAD=$(git rev-list --count "origin/master..origin/$TARGET" 2>/dev/null || echo "0")
          if [ "$AHEAD" -eq 0 ]; then
            echo "No commits ahead of master — skipping PR"
            exit 0
          fi

          if [ -n "$ISSUE_NUM" ]; then
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --json title -q '.title' 2>/dev/null || echo "")
            PR_TITLE="${ISSUE_TITLE:-Implement issue #$ISSUE_NUM}"
            PR_BODY="Closes #${ISSUE_NUM}

          Autonomously implemented by Claude Code via GitHub Actions.

          Generated with [Claude Code](https://claude.ai/code)"
          else
            PR_TITLE="Changes from Claude Code"
            PR_BODY="Autonomously implemented by Claude Code via GitHub Actions."
          fi

          gh pr create --head "$TARGET" --base master --title "$PR_TITLE" --body "$PR_BODY"
          echo "PR created — waiting for reviews before merge"

  fix:
    needs: verify
    if: needs.verify.outputs.pass == 'false' && inputs.attempt != '6'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout temp branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tmp_branch }}
          fetch-depth: 0

      - name: Configure git and auth
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"

      - name: Merge master into branch
        run: |
          git fetch origin master
          git merge origin/master --no-edit || {
            echo "::warning::Merge conflict with master — fix job will resolve"
            git merge --abort
            echo "MERGE_CONFLICT=true" >> $GITHUB_ENV
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Capture errors
        run: |
          CHANGED_FILES=$(git diff --name-only origin/master...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | grep -v node_modules || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES" | xargs npx eslint --quiet > /tmp/lint_errors.txt 2>&1 || true
          else
            echo "No changed files to lint" > /tmp/lint_errors.txt
          fi
          pnpm typecheck > /tmp/tc_errors.txt 2>&1 || true
          npx react-native bundle --platform ios --dev false --entry-file index.js --bundle-output /tmp/bundle.js > /tmp/bundle_errors.txt 2>&1 || true
          pnpm test > /tmp/test_errors.txt 2>&1 || true

          # Check for unlinked native dependencies
          echo "" > /tmp/native_dep_errors.txt
          for pkg in $(node -e "
            const pkg = require('./package.json');
            const deps = { ...pkg.dependencies, ...pkg.devDependencies };
            Object.keys(deps)
              .filter(d => d.startsWith('react-native-') || d.startsWith('@react-native-'))
              .forEach(d => console.log(d));
          "); do
            PKG_DIR="node_modules/$pkg"
            [ ! -d "$PKG_DIR" ] && continue
            HAS_NATIVE=false
            if ls "$PKG_DIR"/*.podspec 1>/dev/null 2>&1 || [ -d "$PKG_DIR/ios" ]; then
              HAS_NATIVE=true
            fi
            if [ "$HAS_NATIVE" = "true" ]; then
              if ! grep -q "node_modules/$pkg" ios/Podfile.lock 2>/dev/null; then
                echo "UNLINKED: $pkg is in package.json with native iOS code but missing from ios/Podfile.lock" >> /tmp/native_dep_errors.txt
              fi
            fi
          done

      - name: Build error summary
        id: errors
        run: |
          # Build a concise error summary to embed directly in the prompt
          SUMMARY=""

          LINT_ERRORS=$(cat /tmp/lint_errors.txt 2>/dev/null | grep -E "error " | head -10 || true)
          if [ -n "$LINT_ERRORS" ]; then
            SUMMARY="${SUMMARY}
          LINT ERRORS:
          ${LINT_ERRORS}"
          fi

          TC_ERRORS=$(cat /tmp/tc_errors.txt 2>/dev/null | grep -E "error TS" | head -10 || true)
          if [ -n "$TC_ERRORS" ]; then
            SUMMARY="${SUMMARY}
          TYPECHECK ERRORS:
          ${TC_ERRORS}"
          fi

          BUNDLE_ERRORS=$(cat /tmp/bundle_errors.txt 2>/dev/null | grep -iE "error|unable to resolve" | head -5 || true)
          if [ -n "$BUNDLE_ERRORS" ]; then
            SUMMARY="${SUMMARY}
          BUNDLE ERRORS:
          ${BUNDLE_ERRORS}"
          fi

          TEST_ERRORS=$(cat /tmp/test_errors.txt 2>/dev/null | grep -E "● |FAIL " | head -10 || true)
          if [ -n "$TEST_ERRORS" ]; then
            SUMMARY="${SUMMARY}
          TEST FAILURES:
          ${TEST_ERRORS}"
          fi

          NATIVE_ERRORS=$(cat /tmp/native_dep_errors.txt 2>/dev/null | grep -E "UNLINKED" || true)
          if [ -n "$NATIVE_ERRORS" ]; then
            SUMMARY="${SUMMARY}
          NATIVE DEP ERRORS:
          ${NATIVE_ERRORS}"
          fi

          if [ "$MERGE_CONFLICT" = "true" ]; then
            SUMMARY="MERGE CONFLICT WITH MASTER — resolve this first.
          ${SUMMARY}"
          fi

          # Save for use in prompt (escape for GitHub Actions)
          echo "summary<<EOFSUM" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOFSUM" >> $GITHUB_OUTPUT

      - name: Claude fix (with cross-attempt context)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Fix attempt ${{ inputs.attempt }}/6. Your code has lint, typecheck, or test errors.

            HERE ARE THE ERRORS — fix these:
            ${{ steps.errors.outputs.summary }}

            INSTRUCTIONS:
            1. If there's a merge conflict, run `git fetch origin master && git merge origin/master --no-edit`, resolve conflicts, then `git add` and `git commit`.
            2. Check if .claude-fix-log.md exists in the repo root. If yes, read it first — it has notes from previous attempts. Do NOT repeat failed approaches.
            3. Read the error files at /tmp/lint_errors.txt, /tmp/tc_errors.txt, /tmp/bundle_errors.txt, /tmp/test_errors.txt, /tmp/native_dep_errors.txt for full details.
            4. Fix ONE FILE AT A TIME. After each file, run `pnpm typecheck` to confirm no new errors.
            5. Do NOT use `any` types — fix root causes.
            6. If native_dep_errors.txt shows unlinked packages, use lazy/optional imports (can't run pod install on Ubuntu).
            7. If tests fail with "snapshot was not written", run `pnpm test -- -u` to update snapshots.
            8. After fixing, run `pnpm typecheck && pnpm test` to confirm ZERO errors.
            9. Then git add and git commit your changes.
            10. LAST: Update .claude-fix-log.md (create if needed) with: errors found, changes made, whether checks pass now, remaining issues. This helps the next attempt.

            CRITICAL — PUSH AFTER EACH MILESTONE: After every significant fix (e.g. fixing a file, resolving a category of errors), git add, git commit, and push immediately using: git push origin HEAD:refs/heads/${{ inputs.tmp_branch }}
            If this job times out, unpushed work is lost. Push early and often.
          settings: |
            {
              "maxTurns": 50,
              "allowedTools": [
                "Edit", "MultiEdit", "Glob", "Grep", "LS", "Read", "Write",
                "Bash(git add:*)", "Bash(git commit:*)", "Bash(git status:*)",
                "Bash(git diff:*)", "Bash(git log:*)", "Bash(git show:*)",
                "Bash(git rm:*)", "Bash(git push:*)", "Bash(git fetch:*)",
                "Bash(git merge:*)", "Bash(git checkout:*)", "Bash(git rebase:*)",
                "Bash(pnpm:*)", "Bash(npx:*)", "Bash(node:*)"
              ]
            }

      - name: Push fixes to temp branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Stage fix log if it was created/updated
          if [ -f .claude-fix-log.md ]; then
            git add .claude-fix-log.md
          fi

          CHANGES=$(git status --porcelain | grep -v '^?? output.txt$' || true)
          if [ -n "$CHANGES" ]; then
            git add -u
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "fix: resolve lint/typecheck/test errors (attempt ${{ inputs.attempt }})

          Co-authored-by: Claude <noreply@anthropic.com>"
            fi
          fi

          # Check if Claude actually produced any changes
          git fetch origin "${{ inputs.tmp_branch }}" 2>/dev/null || true
          LOCAL_HEAD=$(git rev-parse HEAD)
          REMOTE_HEAD=$(git rev-parse "origin/${{ inputs.tmp_branch }}" 2>/dev/null || echo "none")

          if [ "$LOCAL_HEAD" = "$REMOTE_HEAD" ]; then
            echo "::warning::Claude produced no changes — skipping to give-up"
            echo "no_changes=true" >> $GITHUB_ENV
          else
            # Claude may have already pushed mid-run — rebase on top
            git pull --rebase origin "${{ inputs.tmp_branch }}" 2>/dev/null || true
            git push origin "HEAD:refs/heads/${{ inputs.tmp_branch }}"
          fi

      - name: Trigger next verify-merge attempt
        if: env.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEXT_ATTEMPT=$(( ${{ inputs.attempt }} + 1 ))

          gh workflow run verify-merge.yml \
            --repo "${{ github.repository }}" \
            --ref master \
            -f tmp_branch="${{ inputs.tmp_branch }}" \
            -f target_branch="${{ inputs.target_branch }}" \
            -f issue_number="${{ inputs.issue_number }}" \
            -f attempt="$NEXT_ATTEMPT"

          echo "Triggered verify-merge attempt $NEXT_ATTEMPT"

      - name: Early give-up if no changes
        if: env.no_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_NUM="${{ inputs.issue_number }}"
          TMP_BRANCH="${{ inputs.tmp_branch }}"

          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Fix attempt ${{ inputs.attempt }}/6 produced no changes — Claude could not fix the errors. Remaining attempts skipped.

          Claude's work is on [\`${TMP_BRANCH}\`](https://github.com/${{ github.repository }}/tree/${TMP_BRANCH}).

          To retry manually: Actions > Verify and Merge > Run workflow with \`tmp_branch: ${TMP_BRANCH}\`, \`target_branch: ${{ inputs.target_branch }}\`, \`attempt: 1\`
          EOF
            )" 2>/dev/null || echo "Failed to post comment"
          fi

      # ── Rescue step: runs ONLY when the fix job is cancelled (e.g. timeout) ──
      - name: Rescue work on timeout
        if: cancelled()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          TMP_BRANCH="${{ inputs.tmp_branch }}"
          ISSUE_NUM="${{ inputs.issue_number }}"

          # Commit any uncommitted work
          git add -A -- ':!output.txt' ':!node_modules'
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "wip: rescue work from timed-out fix attempt ${{ inputs.attempt }} (#${ISSUE_NUM})

          Fix job timed out after 60 minutes. This commit saves all in-progress work.

          Co-authored-by: Claude <noreply@anthropic.com>"
          fi

          # Push rescued work to the tmp branch
          git fetch origin "$TMP_BRANCH" 2>/dev/null || true
          git pull --rebase origin "$TMP_BRANCH" 2>/dev/null || true
          git push origin "HEAD:refs/heads/$TMP_BRANCH"
          echo "Rescued work to $TMP_BRANCH"

          # Trigger next attempt so the fix loop continues
          NEXT_ATTEMPT=$(( ${{ inputs.attempt }} + 1 ))
          if [ "$NEXT_ATTEMPT" -le 6 ]; then
            gh workflow run verify-merge.yml \
              --repo "${{ github.repository }}" \
              --ref master \
              -f tmp_branch="$TMP_BRANCH" \
              -f target_branch="${{ inputs.target_branch }}" \
              -f issue_number="$ISSUE_NUM" \
              -f attempt="$NEXT_ATTEMPT"
            echo "Triggered verify-merge attempt $NEXT_ATTEMPT after timeout rescue"
          fi

          # Notify on the issue
          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Fix attempt ${{ inputs.attempt }}/6 timed out after 60 minutes. In-progress work was saved to [\`${TMP_BRANCH}\`](https://github.com/${{ github.repository }}/tree/${TMP_BRANCH}).

          Automatically continuing with attempt $NEXT_ATTEMPT.
          EOF
            )" 2>/dev/null || echo "Failed to post timeout comment"
          fi

  give-up:
    needs: verify
    if: needs.verify.outputs.pass == 'false' && inputs.attempt == '6'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Comment on issue about failure
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_NUM="${{ inputs.issue_number }}"
          TMP_BRANCH="${{ inputs.tmp_branch }}"

          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Checks failed after 6 fix attempts. Claude's work is on [\`${TMP_BRANCH}\`](https://github.com/${{ github.repository }}/tree/${TMP_BRANCH}).

          To retry manually: Actions > Verify and Merge > Run workflow with \`tmp_branch: ${TMP_BRANCH}\`, \`target_branch: ${{ inputs.target_branch }}\`, \`attempt: 1\`

          To retry with Claude, comment on the issue tagging the agent to fix the errors on this branch.
          EOF
            )" 2>/dev/null || echo "Failed to post comment"
          fi

      - name: Clean up stale temp branches
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Delete tmp/ branches older than the current one (keep latest for inspection)
          CURRENT="${{ inputs.tmp_branch }}"
          gh api "repos/${{ github.repository }}/git/matching-refs/heads/tmp/" \
            --jq '.[].ref' 2>/dev/null | sed 's|^refs/heads/||' | while read -r branch; do
            if [ "$branch" != "$CURRENT" ]; then
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$branch" 2>/dev/null \
                && echo "Cleaned up $branch" || true
            fi
          done
