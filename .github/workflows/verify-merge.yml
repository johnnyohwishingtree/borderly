name: Verify and Merge
run-name: "Verify #${{ inputs.issue_number }} → ${{ inputs.target_branch }} (attempt ${{ inputs.attempt }}/6)"

# Checks out a temporary branch, runs lint + typecheck + test.
# If all pass: merges into the target branch, cleans up temp branch, creates PR.
# If fail: Claude fixes once (fresh context), pushes, triggers itself again.
# Max 6 attempts to prevent infinite loops.

on:
  workflow_dispatch:
    inputs:
      tmp_branch:
        description: 'Temporary branch with Claude work'
        required: true
        type: string
      target_branch:
        description: 'Target branch to merge into (PR branch)'
        required: true
        type: string
      issue_number:
        description: 'Related issue number'
        required: false
        type: string
      attempt:
        description: 'Current attempt number (1-6)'
        required: false
        type: string
        default: '1'

concurrency:
  group: verify-merge-${{ inputs.tmp_branch }}-attempt-${{ inputs.attempt }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write

jobs:
  link-to-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: inputs.issue_number != ''
    steps:
      - name: Post workflow run link on issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "${{ inputs.issue_number }}" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Verify and Merge — [attempt ${{ inputs.attempt }}/6]($RUN_URL)
          EOF
          )" 2>/dev/null || echo "Failed to post link comment"

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      pass: ${{ steps.checks.outputs.pass }}
      error_summary: ${{ steps.checks.outputs.error_summary }}

    steps:
      - name: Checkout temp branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tmp_branch }}
          fetch-depth: 0

      - name: Merge master into branch
        run: |
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"
          git fetch origin master
          git merge origin/master --no-edit || {
            echo "::warning::Merge conflict with master — fix job will resolve"
            git merge --abort
            echo "MERGE_CONFLICT=true" >> $GITHUB_ENV
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Run checks (lint + typecheck + test)
        id: checks
        run: |
          PASS=true
          SUMMARY=""

          if [ "$MERGE_CONFLICT" = "true" ]; then
            echo "Merge conflict with master — cannot run checks"
            echo "pass=false" >> $GITHUB_OUTPUT
            echo "error_summary=MERGE CONFLICT WITH MASTER — resolve this first." >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "=== Lint (changed files only) ==="
          CHANGED_FILES=$(git diff --name-only origin/master...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | grep -v node_modules || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "Linting $(echo "$CHANGED_FILES" | wc -l | tr -d ' ') changed files"
            LINT_OUT=$(echo "$CHANGED_FILES" | xargs npx eslint --quiet 2>&1) || true
            if echo "$LINT_OUT" | grep -qE "error "; then
              echo "Lint FAILED"
              PASS=false
              LINT_ERRORS=$(echo "$LINT_OUT" | grep -E "error " | head -10)
              SUMMARY="${SUMMARY}
          LINT ERRORS:
          ${LINT_ERRORS}"
            fi
          else
            echo "No changed JS/TS files to lint"
          fi

          echo "=== Typecheck ==="
          TC_OUT=$(pnpm typecheck 2>&1) || true
          if echo "$TC_OUT" | grep -qE "error TS"; then
            echo "Typecheck FAILED"
            PASS=false
            TC_ERRORS=$(echo "$TC_OUT" | grep -E "error TS" | head -10)
            SUMMARY="${SUMMARY}
          TYPECHECK ERRORS:
          ${TC_ERRORS}"
          fi

          if [ "$PASS" = "true" ]; then
            echo "=== Metro Bundle ==="
            BUNDLE_OUT=$(npx react-native bundle --platform ios --dev false --entry-file index.js --bundle-output /tmp/bundle.js 2>&1) || true
            if echo "$BUNDLE_OUT" | grep -qiE "error|unable to resolve"; then
              echo "Metro Bundle FAILED"
              PASS=false
              BUNDLE_ERRORS=$(echo "$BUNDLE_OUT" | grep -iE "error|unable to resolve" | head -5)
              SUMMARY="${SUMMARY}
          BUNDLE ERRORS:
          ${BUNDLE_ERRORS}"
            fi
          fi

          if [ "$PASS" = "true" ]; then
            echo "=== Tests ==="
            TEST_OUT=$(pnpm test 2>&1) || true
            if echo "$TEST_OUT" | grep -qE "FAIL "; then
              echo "Tests FAILED"
              PASS=false
              TEST_ERRORS=$(echo "$TEST_OUT" | grep -E "FAIL |● |Expected|Received" | grep -v "● Console" | head -20)
              SUMMARY="${SUMMARY}
          TEST FAILURES:
          ${TEST_ERRORS}"
            fi
          fi

          if [ "$PASS" = "true" ]; then
            echo "=== Native Dependency Check ==="
            MISSING=""
            for pkg in $(node -e "
              const pkg = require('./package.json');
              const deps = { ...pkg.dependencies, ...pkg.devDependencies };
              Object.keys(deps)
                .filter(d => d.startsWith('react-native-') || d.startsWith('@react-native-'))
                .forEach(d => console.log(d));
            "); do
              PKG_DIR="node_modules/$pkg"
              [ ! -d "$PKG_DIR" ] && continue
              HAS_NATIVE=false
              if ls "$PKG_DIR"/*.podspec 1>/dev/null 2>&1 || [ -d "$PKG_DIR/ios" ]; then
                HAS_NATIVE=true
              fi
              if [ "$HAS_NATIVE" = "true" ]; then
                if ! grep -q "node_modules/$pkg" ios/Podfile.lock 2>/dev/null; then
                  MISSING="$MISSING $pkg"
                fi
              fi
            done
            if [ -n "$MISSING" ]; then
              echo "Native Dependency Check FAILED"
              PASS=false
              NATIVE_ERRORS=""
              for m in $MISSING; do
                NATIVE_ERRORS="${NATIVE_ERRORS}
          UNLINKED: $m is in package.json with native iOS code but missing from ios/Podfile.lock"
              done
              SUMMARY="${SUMMARY}
          NATIVE DEP ERRORS:
          ${NATIVE_ERRORS}"
            fi
          fi

          echo "pass=$PASS" >> $GITHUB_OUTPUT

          # Pass error summary to fix job (avoid re-running checks)
          echo "error_summary<<EOFERR" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOFERR" >> $GITHUB_OUTPUT

  merge:
    needs: verify
    if: needs.verify.outputs.pass == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0

      - name: Merge temp branch into target
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"

          TMP="${{ inputs.tmp_branch }}"
          TARGET="${{ inputs.target_branch }}"

          if [ "$TMP" = "$TARGET" ]; then
            echo "tmp_branch and target_branch are the same ($TMP) — skipping merge"
          else
            git fetch origin "$TMP"
            git merge "origin/$TMP" --no-edit
          fi

          # Remove fix context log before pushing — it's only for cross-attempt context
          if [ -f .claude-fix-log.md ]; then
            git rm .claude-fix-log.md
            git commit -m "chore: remove fix context log"
          fi

          REMOTE_EXISTS=$(git ls-remote --heads origin "$TARGET" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$REMOTE_EXISTS" -eq 0 ]; then
            git push -u origin HEAD
          else
            git push origin HEAD
          fi

          echo "Merged $TMP into $TARGET"

      - name: Delete temp branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TMP="${{ inputs.tmp_branch }}"
          TARGET="${{ inputs.target_branch }}"

          # Never delete the target branch — only delete tmp if it's separate
          if [ "$TMP" = "$TARGET" ]; then
            echo "tmp_branch is the same as target_branch — skipping delete"
            exit 0
          fi

          gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$TMP" 2>/dev/null \
            && echo "Deleted $TMP" \
            || echo "Failed to delete $TMP"

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TARGET="${{ inputs.target_branch }}"
          ISSUE_NUM="${{ inputs.issue_number }}"

          EXISTING=$(gh pr list --head "$TARGET" --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $TARGET"
            exit 0
          fi

          AHEAD=$(git rev-list --count "origin/master..origin/$TARGET" 2>/dev/null || echo "0")
          if [ "$AHEAD" -eq 0 ]; then
            echo "No commits ahead of master — skipping PR"
            exit 0
          fi

          if [ -n "$ISSUE_NUM" ]; then
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --json title -q '.title' 2>/dev/null || echo "")
            PR_TITLE="${ISSUE_TITLE:-Implement issue #$ISSUE_NUM}"
            PR_BODY="Closes #${ISSUE_NUM}

          Autonomously implemented by Claude Code via GitHub Actions.

          Generated with [Claude Code](https://claude.ai/code)"
          else
            PR_TITLE="Changes from Claude Code"
            PR_BODY="Autonomously implemented by Claude Code via GitHub Actions."
          fi

          # Try creating PR; if GitHub's ref cache is stale after force-push,
          # create a fresh branch and retry
          if ! gh pr create --head "$TARGET" --base master --title "$PR_TITLE" --body "$PR_BODY" 2>/tmp/pr_error.txt; then
            if grep -qi "Head sha can't be blank\|No commits between\|Head ref must be" /tmp/pr_error.txt; then
              echo "::warning::GitHub can't resolve branch ref — creating fresh branch and retrying"
              FRESH="pr/issue-${ISSUE_NUM:-unknown}"
              git push origin "HEAD:refs/heads/$FRESH" --force
              if gh pr create --head "$FRESH" --base master --title "$PR_TITLE" --body "$PR_BODY"; then
                echo "PR created from fresh branch $FRESH"
              else
                echo "::error::Failed to create PR even with fresh branch"
                cat /tmp/pr_error.txt
                exit 1
              fi
            else
              echo "::error::Failed to create PR"
              cat /tmp/pr_error.txt
              exit 1
            fi
          else
            echo "PR created — waiting for reviews before merge"
          fi

  fix:
    needs: verify
    if: needs.verify.outputs.pass == 'false' && inputs.attempt != '6'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout temp branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tmp_branch }}
          fetch-depth: 0

      - name: Configure git and auth
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "Claude CI"
          git config user.email "claude-ci@users.noreply.github.com"

      - name: Merge master into branch
        run: |
          git fetch origin master
          git merge origin/master --no-edit || {
            echo "::warning::Merge conflict with master — fix job will resolve"
            git merge --abort
            echo "MERGE_CONFLICT=true" >> $GITHUB_ENV
          }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Collect commit context
        id: context
        run: |
          # Give the fix job context about what the branch changed and why
          COMMIT_LOG=$(git log --oneline origin/master..HEAD 2>/dev/null | head -20 || echo "(no commits)")
          DIFF_STAT=$(git diff --stat origin/master..HEAD 2>/dev/null | tail -30 || echo "(no diff)")

          echo "commit_context<<EOFCTX" >> $GITHUB_OUTPUT
          echo "BRANCH COMMIT HISTORY (what was changed and why — use this to decide whether to fix source code or update tests):" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "FILES CHANGED vs master:" >> $GITHUB_OUTPUT
          echo "$DIFF_STAT" >> $GITHUB_OUTPUT
          echo "EOFCTX" >> $GITHUB_OUTPUT

      - name: Claude fix (with cross-attempt context)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          prompt: |
            Fix attempt ${{ inputs.attempt }}/6. Fix the errors below, then push.

            ${{ steps.context.outputs.commit_context }}

            ERRORS:
            ${{ needs.verify.outputs.error_summary }}

            STEPS:
            1. If .claude-fix-log.md exists, read it first — do NOT repeat failed approaches.
            2. Fix the errors. Do NOT use `any` types. Fix ONE FILE AT A TIME, run `pnpm typecheck` after each.
            3. Run `pnpm typecheck && pnpm test` to confirm ZERO errors.
            4. git add, commit, push: `git push origin HEAD:refs/heads/${{ inputs.tmp_branch }}`
            5. Update .claude-fix-log.md with what you fixed and whether checks pass now.

            Push after each milestone — unpushed work is lost on timeout.
          show_full_output: true
          settings: |
            {
              "maxTurns": 20,
              "allowedTools": [
                "Edit", "MultiEdit", "Glob", "Grep", "LS", "Read", "Write",
                "Bash(*)"
              ]
            }

      - name: Check for permission issues
        run: |
          LOG="/home/runner/work/_temp/claude-execution-output.json"
          if [ -f "$LOG" ]; then
            DENIALS=$(grep -o '"permission_denials_count":[0-9]*' "$LOG" | grep -o '[0-9]*' || echo "0")
            TURNS=$(grep -o '"num_turns":[0-9]*' "$LOG" | grep -o '[0-9]*' || echo "0")
            echo "Permission denials: $DENIALS, Turns used: $TURNS"
            if [ "$DENIALS" -gt 10 ]; then
              echo "::error::Claude hit $DENIALS permission denials in $TURNS turns — allowedTools config may be too restrictive"
              exit 1
            fi
          fi

      - name: Push fixes to temp branch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Stage fix log if it was created/updated
          if [ -f .claude-fix-log.md ]; then
            git add .claude-fix-log.md
          fi

          CHANGES=$(git status --porcelain | grep -v '^?? output.txt$' || true)
          if [ -n "$CHANGES" ]; then
            git add -u
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "fix: resolve lint/typecheck/test errors (attempt ${{ inputs.attempt }})

          Co-authored-by: Claude <noreply@anthropic.com>"
            fi
          fi

          # Check if Claude actually produced any changes
          git fetch origin "${{ inputs.tmp_branch }}" 2>/dev/null || true
          LOCAL_HEAD=$(git rev-parse HEAD)
          REMOTE_HEAD=$(git rev-parse "origin/${{ inputs.tmp_branch }}" 2>/dev/null || echo "none")

          if [ "$LOCAL_HEAD" = "$REMOTE_HEAD" ]; then
            echo "::warning::Claude produced no changes — skipping to give-up"
            echo "no_changes=true" >> $GITHUB_ENV
          else
            # Claude may have already pushed mid-run — rebase on top
            git pull --rebase origin "${{ inputs.tmp_branch }}" 2>/dev/null || true
            git push origin "HEAD:refs/heads/${{ inputs.tmp_branch }}"
          fi

      - name: Trigger next verify-merge attempt
        if: env.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NEXT_ATTEMPT=$(( ${{ inputs.attempt }} + 1 ))

          gh workflow run verify-merge.yml \
            --repo "${{ github.repository }}" \
            --ref master \
            -f tmp_branch="${{ inputs.tmp_branch }}" \
            -f target_branch="${{ inputs.target_branch }}" \
            -f issue_number="${{ inputs.issue_number }}" \
            -f attempt="$NEXT_ATTEMPT"

          echo "Triggered verify-merge attempt $NEXT_ATTEMPT"

      - name: Early give-up if no changes
        if: env.no_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_NUM="${{ inputs.issue_number }}"
          TMP_BRANCH="${{ inputs.tmp_branch }}"

          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Fix attempt ${{ inputs.attempt }}/6 produced no changes — Claude could not fix the errors. Remaining attempts skipped.

          Claude's work is on [\`${TMP_BRANCH}\`](https://github.com/${{ github.repository }}/tree/${TMP_BRANCH}).

          To retry manually: Actions > Verify and Merge > Run workflow with \`tmp_branch: ${TMP_BRANCH}\`, \`target_branch: ${{ inputs.target_branch }}\`, \`attempt: 1\`
          EOF
            )" 2>/dev/null || echo "Failed to post comment"
          fi

      # ── Rescue step: runs ONLY when the fix job is cancelled (e.g. timeout) ──
      - name: Rescue work on timeout
        if: cancelled()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          TMP_BRANCH="${{ inputs.tmp_branch }}"
          ISSUE_NUM="${{ inputs.issue_number }}"

          # Commit any uncommitted work
          git add -A -- ':!output.txt' ':!node_modules'
          if [ -n "$(git diff --cached --name-only)" ]; then
            git commit -m "wip: rescue work from timed-out fix attempt ${{ inputs.attempt }} (#${ISSUE_NUM})

          Fix job timed out after 60 minutes. This commit saves all in-progress work.

          Co-authored-by: Claude <noreply@anthropic.com>"
          fi

          # Push rescued work to the tmp branch
          git fetch origin "$TMP_BRANCH" 2>/dev/null || true
          git pull --rebase origin "$TMP_BRANCH" 2>/dev/null || true
          git push origin "HEAD:refs/heads/$TMP_BRANCH"
          echo "Rescued work to $TMP_BRANCH"

          # Trigger next attempt so the fix loop continues
          NEXT_ATTEMPT=$(( ${{ inputs.attempt }} + 1 ))
          if [ "$NEXT_ATTEMPT" -le 6 ]; then
            gh workflow run verify-merge.yml \
              --repo "${{ github.repository }}" \
              --ref master \
              -f tmp_branch="$TMP_BRANCH" \
              -f target_branch="${{ inputs.target_branch }}" \
              -f issue_number="$ISSUE_NUM" \
              -f attempt="$NEXT_ATTEMPT"
            echo "Triggered verify-merge attempt $NEXT_ATTEMPT after timeout rescue"
          fi

          # Notify on the issue
          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Fix attempt ${{ inputs.attempt }}/6 timed out after 60 minutes. In-progress work was saved to [\`${TMP_BRANCH}\`](https://github.com/${{ github.repository }}/tree/${TMP_BRANCH}).

          Automatically continuing with attempt $NEXT_ATTEMPT.
          EOF
            )" 2>/dev/null || echo "Failed to post timeout comment"
          fi

  give-up:
    needs: verify
    if: needs.verify.outputs.pass == 'false' && inputs.attempt == '6'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Comment on issue about failure
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_NUM="${{ inputs.issue_number }}"
          TMP_BRANCH="${{ inputs.tmp_branch }}"

          if [ -n "$ISSUE_NUM" ]; then
            # Collect failed run IDs for this issue's verify-merge attempts
            FAILED_RUNS=$(gh run list --repo "${{ github.repository }}" --workflow verify-merge.yml \
              --json databaseId,displayTitle,conclusion \
              -q "[.[] | select(.displayTitle | contains(\"#${ISSUE_NUM}\"))] | .[].databaseId" \
              2>/dev/null | tr '\n' ',' | sed 's/,$//' || echo "")

            gh issue comment "$ISSUE_NUM" --repo "${{ github.repository }}" --body "$(cat <<EOF
          Checks failed after 6 fix attempts. Claude's work is on [\`${TMP_BRANCH}\`](https://github.com/${{ github.repository }}/tree/${TMP_BRANCH}).

          Triggering Pipeline Doctor to diagnose the failure.
          EOF
            )" 2>/dev/null || echo "Failed to post comment"

            # Trigger pipeline doctor
            gh workflow run pipeline-doctor.yml \
              --repo "${{ github.repository }}" \
              --ref master \
              -f issue_number="$ISSUE_NUM" \
              -f trigger_source="verify-merge" \
              -f failed_run_ids="$FAILED_RUNS"
            echo "Triggered pipeline doctor for issue #$ISSUE_NUM"
          fi

      - name: Clean up stale temp branches
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Delete tmp/ branches older than the current one (keep latest for inspection)
          CURRENT="${{ inputs.tmp_branch }}"
          gh api "repos/${{ github.repository }}/git/matching-refs/heads/tmp/" \
            --jq '.[].ref' 2>/dev/null | sed 's|^refs/heads/||' | while read -r branch; do
            if [ "$branch" != "$CURRENT" ]; then
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$branch" 2>/dev/null \
                && echo "Cleaned up $branch" || true
            fi
          done
