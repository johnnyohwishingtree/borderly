# COMPLEX SCENARIO: Onboarding + Family Navigation + Trip Creation + Form Save
#
# Scenario: The Smith family primary user onboards, verifies family
# management screens, creates a Japan trip, and saves the leg form.
#
# Phase 1: Onboard primary user (John - father)
# Phase 2: Navigate to family management, verify screens load
# Phase 3: Create a Japan trip
# Phase 4: Open trip and save leg form
appId: com.borderly.app
tags:
  - complex
  - family
  - critical
---

# ============================================================
# PHASE 1: Primary user onboarding
# ============================================================
- launchApp:
    clearState: true

- runFlow: subflows/onboard-primary-user.yaml

# ============================================================
# PHASE 2: Navigate to family management and verify screens
# ============================================================

# Navigate to Profile tab
- tapOn:
    id: "tab-profile"

- extendedWaitUntil:
    visible: "Travel Profile"
    timeout: 10000

- scrollUntilVisible:
    element: "Family Members"
    direction: DOWN
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "manage-family-button"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "manage-family-button"

# Family management screen - verify it loads
- extendedWaitUntil:
    visible: "Family Members"
    timeout: 10000
- extendedWaitUntil:
    visible: "Add Member"
    timeout: 5000

# Tap Add Member to verify AddFamilyMember screen loads
- tapOn:
    id: "add-member-button"
- extendedWaitUntil:
    visible: "Add Family Member"
    timeout: 10000

# ============================================================
# PHASE 3: Navigate to Trips and create a trip
# ============================================================

# Tab bar is visible from any screen — tap Trips directly
- tapOn:
    id: "tab-trips"
- extendedWaitUntil:
    visible: "Your Trips"
    timeout: 15000

- runFlow: subflows/create-japan-trip.yaml

# ============================================================
# PHASE 4: Open trip and save Japan leg form
# ============================================================

- tapOn:
    id: "trip-card-Smith Family Asia"

- extendedWaitUntil:
    visible: "Itinerary"
    timeout: 10000
- assertVisible:
    id: "leg-card-JPN"

- tapOn:
    id: "leg-card-JPN"

# Wait for form to load
- extendedWaitUntil:
    visible: "Travel Form"
    timeout: 15000

# Scroll to save
- scrollUntilVisible:
    element:
      id: "save-progress-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "save-progress-button"

# Success alert
- extendedWaitUntil:
    visible: "Form data saved successfully!"
    timeout: 10000
- tapOn: "OK"
