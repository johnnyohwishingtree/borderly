# Shared subflow: Onboard primary user from app launch to main screen
#
# Usage from any flow:
#   - runFlow: subflows/onboard-primary-user.yaml
#
# Precondition: App launched with clearState: true
# Postcondition: On "Your Trips" main screen, onboarding complete
appId: com.borderly.app
---

# === WELCOME SCREEN ===
- extendedWaitUntil:
    visible: "Borderly"
    timeout: 15000
- assertVisible: "Welcome to"
- scrollUntilVisible:
    element:
      id: "take-tutorial-button"
    direction: DOWN
- tapOn:
    id: "take-tutorial-button"

# === TUTORIAL SCREEN ===
- extendedWaitUntil:
    visible: "Step 1 of 5"
    timeout: 10000
- tapOn:
    id: "skip-tutorial-button"

# === PASSPORT SCAN SCREEN ===
- extendedWaitUntil:
    visible: "Passport Information"
    timeout: 15000

# Dismiss performance optimization hint if present
- runFlow:
    when:
      visible: "Performance Optimization Enabled"
    commands:
      - tapOn: "Dismiss"

# Choose manual entry
- scrollUntilVisible:
    element:
      id: "enter-manually-button"
    direction: DOWN
- tapOn:
    id: "enter-manually-button"

# === MANUAL PASSPORT FORM ===
- extendedWaitUntil:
    visible:
      id: "passport-number-input"
    timeout: 10000

# Swipe content down to reveal passport number at top
- swipe:
    start: "50%,30%"
    end: "50%,60%"
    duration: 300

# Passport Number
- tapOn:
    id: "passport-number-input"
- inputText: "L12345678"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Surname
- scrollUntilVisible:
    element:
      id: "surname-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "surname-input"
- inputText: "SMITH"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Given Names
- scrollUntilVisible:
    element:
      id: "given-names-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "given-names-input"
- inputText: "JOHN MICHAEL"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Nationality
- scrollUntilVisible:
    element:
      id: "nationality-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "nationality-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Date of Birth
- scrollUntilVisible:
    element:
      id: "dob-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "dob-input"
- inputText: "1985-06-15"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Gender
- scrollUntilVisible:
    element:
      id: "gender-Male-button"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "gender-Male-button"

# Passport expiry
- scrollUntilVisible:
    element:
      id: "passport-expiry-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "passport-expiry-input"
- inputText: "2032-03-20"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Issuing country
- scrollUntilVisible:
    element:
      id: "issuing-country-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "issuing-country-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Extra dismiss before Continue
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "passport-continue-button"
    direction: DOWN
- tapOn:
    id: "passport-continue-button"

# === CONFIRM PROFILE SCREEN ===
- extendedWaitUntil:
    visible: "Confirm Your Profile"
    timeout: 30000
- assertVisible: "L12345678"
- assertVisible: "JOHN MICHAEL SMITH"

- scrollUntilVisible:
    element:
      id: "continue-to-security-button"
    direction: DOWN
- tapOn:
    id: "continue-to-security-button"

# Retry if button tap didn't register
- runFlow:
    when:
      visible:
        id: "continue-to-security-button"
    commands:
      - tapOn:
          id: "continue-to-security-button"

# === BIOMETRIC SETUP - SKIP ===
- extendedWaitUntil:
    visible: "Secure Your Profile"
    timeout: 15000
- tapOn:
    id: "skip-biometric-button"
- extendedWaitUntil:
    visible: "Skip"
    timeout: 5000
- tapOn: "Skip"

# Handle welcome alert if present
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"

# === MAIN SCREEN ===
- extendedWaitUntil:
    visible: "Your Trips"
    timeout: 15000
- assertVisible: "No trips yet"
