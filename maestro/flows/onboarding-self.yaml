# Flow 1: Primary user onboarding with manual passport entry
# This is the first step of the family-of-4 scenario.
# The primary user (parent) goes through full onboarding.
appId: com.borderly.app
tags:
  - onboarding
  - critical
---
- launchApp:
    clearState: true

# Welcome screen
- extendedWaitUntil:
    visible: "Borderly"
    timeout: 15000
- assertVisible: "Welcome to"

# Take tutorial then skip (more reliable than skip from welcome screen)
- scrollUntilVisible:
    element:
      id: "take-tutorial-button"
    direction: DOWN
- tapOn:
    id: "take-tutorial-button"

- extendedWaitUntil:
    visible: "Step 1 of 5"
    timeout: 10000
- tapOn:
    id: "skip-tutorial-button"

# Passport Scan screen - choose manual entry
- extendedWaitUntil:
    visible: "Passport Information"
    timeout: 15000

# Dismiss performance optimization hint if present
- runFlow:
    when:
      visible: "Performance Optimization Enabled"
    commands:
      - tapOn: "Dismiss"

- scrollUntilVisible:
    element:
      id: "enter-manually-button"
    direction: DOWN
- tapOn:
    id: "enter-manually-button"

# Wait for form to render
- extendedWaitUntil:
    visible:
      id: "passport-number-input"
    timeout: 10000

# Swipe to reveal passport number at top
- swipe:
    start: "50%,30%"
    end: "50%,60%"
    duration: 300

# Fill manual passport form
- tapOn:
    id: "passport-number-input"
- inputText: "L12345678"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "surname-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "surname-input"
- inputText: "SMITH"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "given-names-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "given-names-input"
- inputText: "JOHN MICHAEL"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "nationality-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "nationality-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "dob-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "dob-input"
- inputText: "1985-06-15"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Gender selection
- scrollUntilVisible:
    element:
      id: "gender-Male-button"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "gender-Male-button"

# Expiry date
- scrollUntilVisible:
    element:
      id: "passport-expiry-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "passport-expiry-input"
- inputText: "2032-03-20"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Issuing country
- scrollUntilVisible:
    element:
      id: "issuing-country-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "issuing-country-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Extra dismiss before Continue
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element: "Continue"
    direction: DOWN
    timeout: 5000
- tapOn: "Continue"

# Confirm profile screen
- extendedWaitUntil:
    visible: "Confirm Your Profile"
    timeout: 30000
- assertVisible: "JOHN MICHAEL SMITH"
- assertVisible: "L12345678"
- scrollUntilVisible:
    element:
      id: "continue-to-security-button"
    direction: DOWN
- tapOn:
    id: "continue-to-security-button"

# Biometric setup screen
- extendedWaitUntil:
    visible: "Secure Your Profile"
    timeout: 15000
- tapOn: "Skip for Now"

# Handle skip confirmation alert
- extendedWaitUntil:
    visible: "Skip"
    timeout: 5000
- tapOn: "Skip"

# Handle welcome alert
- extendedWaitUntil:
    visible: "OK"
    timeout: 5000
- tapOn: "OK"

# Should now be on main screen
- extendedWaitUntil:
    visible: "Your Trips"
    timeout: 15000
