# Full flow: Onboarding + Trip Creation + Form + Submission Guide
# Single user, single country (Japan) - validates the complete happy path
appId: com.borderly.app
tags:
  - trip
  - submission
  - critical
---

# ============================================================
# PHASE 1: Onboarding
# ============================================================
- launchApp:
    clearState: true

- runFlow: subflows/onboard-primary-user.yaml

# ============================================================
# PHASE 2: Create a trip to Japan
# ============================================================

- runFlow: subflows/create-japan-trip.yaml

# ============================================================
# PHASE 3: Open trip and go to leg form
# ============================================================

# Wait for trip list and tap the trip card
- tapOn:
    id: "trip-card-Smith Family Asia"

- extendedWaitUntil:
    visible: "Itinerary"
    timeout: 10000
- assertVisible:
    id: "leg-card-JPN"

# Tap Japan leg to open form
- tapOn:
    id: "leg-card-JPN"

# ============================================================
# PHASE 4: LegForm - fill remaining fields and mark as ready
# ============================================================
# Most fields are auto-filled from profile/trip data.
# batchAutoFill defaults booleans to false and purposeOfVisit to 'tourism'.
# Only departureCity (text, no autoFillSource) needs manual entry.
# hotelPhone is optional but we fill it for completeness.

# Wait for the Travel Form screen to load
- extendedWaitUntil:
    visible: "Travel Form"
    timeout: 15000

# Dismiss Fast Refresh banner if present
- runFlow:
    when:
      visible: "Dismiss"
    commands:
      - tapOn: "Dismiss"

# Scroll past Form Summary to reach actual form fields
- scrollUntilVisible:
    element: "Airline Company"
    direction: DOWN
    timeout: 10000

# City of Departure — the only required field without autoFillSource
- scrollUntilVisible:
    element:
      id: "field-departureCity"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "field-departureCity"
- inputText: "Los Angeles"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Hotel Phone — optional but fill for completeness
- scrollUntilVisible:
    element:
      id: "field-hotelPhone"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "field-hotelPhone"
- inputText: "03-5322-1234"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Save progress
- scrollUntilVisible:
    element:
      id: "save-progress-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "save-progress-button"

# Success alert — tap OK to dismiss
- extendedWaitUntil:
    visible: "OK"
    timeout: 10000
- tapOn: "OK"

# Mark as Ready — form should be valid now
- scrollUntilVisible:
    element:
      id: "mark-ready-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "mark-ready-button"

# Success alert — tap OK which navigates back
- extendedWaitUntil:
    visible: "OK"
    timeout: 10000
- tapOn: "OK"

# Verify we're back on the trip detail screen
- extendedWaitUntil:
    visible: "Itinerary"
    timeout: 10000
