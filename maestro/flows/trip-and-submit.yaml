# Full flow: Onboarding + Trip Creation + Form + Submission Guide
# Single user, single country (Japan) - validates the complete happy path
appId: com.borderly.app
tags:
  - trip
  - submission
  - critical
---

# ============================================================
# PHASE 1: Onboarding (proven pattern from smoke-test.yaml)
# ============================================================
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "Borderly"
    timeout: 15000
- assertVisible: "Welcome to"
- scrollUntilVisible:
    element:
      id: "take-tutorial-button"
    direction: DOWN
- tapOn:
    id: "take-tutorial-button"

- extendedWaitUntil:
    visible: "Step 1 of 5"
    timeout: 10000
- tapOn:
    id: "skip-tutorial-button"

- extendedWaitUntil:
    visible: "Passport Information"
    timeout: 15000

# Dismiss performance optimization hint if present
- runFlow:
    when:
      visible: "Performance Optimization Enabled"
    commands:
      - tapOn: "Dismiss"

- scrollUntilVisible:
    element:
      id: "enter-manually-button"
    direction: DOWN
- tapOn:
    id: "enter-manually-button"

# Wait for form to render
- extendedWaitUntil:
    visible:
      id: "passport-number-input"
    timeout: 10000

# Swipe content down to reveal passport number at the top
- swipe:
    start: "50%,30%"
    end: "50%,60%"
    duration: 300

# Fill passport form (with keyboard dismiss between fields)
- tapOn:
    id: "passport-number-input"
- inputText: "L12345678"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "surname-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "surname-input"
- inputText: "SMITH"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "given-names-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "given-names-input"
- inputText: "JOHN MICHAEL"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "nationality-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "nationality-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "dob-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "dob-input"
- inputText: "1985-06-15"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "gender-Male-button"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "gender-Male-button"

- scrollUntilVisible:
    element:
      id: "passport-expiry-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "passport-expiry-input"
- inputText: "2032-03-20"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element:
      id: "issuing-country-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "issuing-country-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Extra dismiss before scrolling to Continue
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

- scrollUntilVisible:
    element: "Continue"
    direction: DOWN
- tapOn: "Continue"

# === CONFIRM PROFILE SCREEN ===
- extendedWaitUntil:
    visible: "Confirm Your Profile"
    timeout: 30000
- assertVisible: "L12345678"
- assertVisible: "JOHN MICHAEL SMITH"
# Dismiss debugger warning if covering buttons
- runFlow:
    when:
      visible: "Open debugger to view warnings"
    commands:
      - tapOn:
          point: "93%,94%"
- scrollUntilVisible:
    element:
      id: "continue-to-security-button"
    direction: DOWN
- tapOn:
    id: "continue-to-security-button"

# Biometric setup - skip
- extendedWaitUntil:
    visible: "Secure Your Profile"
    timeout: 15000
- tapOn: "Skip for Now"
- extendedWaitUntil:
    visible: "Skip"
    timeout: 5000
- tapOn: "Skip"
# Handle welcome alert if present (may auto-dismiss)
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"

# Verify main screen
- extendedWaitUntil:
    visible: "Your Trips"
    timeout: 15000
- assertVisible: "No trips yet"

# ============================================================
# PHASE 2: Create a trip to Japan
# ============================================================

- tapOn: "Create Your First Trip"

- extendedWaitUntil:
    visible: "Create New Trip"
    timeout: 10000

# Wait for screen to fully render
- extendedWaitUntil:
    visible: "No destinations added yet"
    timeout: 5000

# Add a destination FIRST (before trip name to avoid keyboard issues)
- tapOn: "+ Add"

# Select Japan from the country buttons
- scrollUntilVisible:
    element: "Japan"
    direction: DOWN
    timeout: 5000
- tapOn: "Japan"

# Now enter trip name while no keyboard is showing
- scrollUntilVisible:
    element: "Trip Name"
    direction: UP
    timeout: 5000
- tapOn:
    id: "trip-name-input"
- inputText: "MyTrip"
# Dismiss keyboard
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Arrival date
- scrollUntilVisible:
    element:
      id: "leg-0-arrival-date"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-arrival-date"
- inputText: "2026-07-01"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Departure date
- scrollUntilVisible:
    element:
      id: "leg-0-departure-date"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-departure-date"
- inputText: "2026-07-07"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Flight number
- scrollUntilVisible:
    element:
      id: "leg-0-flight-number"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-flight-number"
- inputText: "NH101"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Airline code
- scrollUntilVisible:
    element:
      id: "leg-0-airline-code"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-airline-code"
- inputText: "NH"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Arrival airport
- scrollUntilVisible:
    element:
      id: "leg-0-arrival-airport"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-arrival-airport"
- inputText: "NRT"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Accommodation name
- scrollUntilVisible:
    element:
      id: "leg-0-accommodation-name"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-accommodation-name"
- inputText: "Park Hyatt Tokyo"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Address
- scrollUntilVisible:
    element:
      id: "leg-0-accommodation-address"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-accommodation-address"
- inputText: "3-7-1-2 Nishi Shinjuku"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# City
- scrollUntilVisible:
    element:
      id: "leg-0-accommodation-city"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-accommodation-city"
- inputText: "Shinjuku"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Postal code
- scrollUntilVisible:
    element:
      id: "leg-0-accommodation-postal-code"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "leg-0-accommodation-postal-code"
- inputText: "163-1055"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Dismiss keyboard and scroll to Create Trip button
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200
- scrollUntilVisible:
    element: "Hotel phone number"
    direction: DOWN
    timeout: 5000
# Scroll a bit more to reveal the Create Trip button below phone
- swipe:
    direction: UP
    duration: 500
- swipe:
    direction: UP
    duration: 500
# Tap the Create Trip button (use index 1 to skip nav bar title)
- tapOn:
    text: "Create Trip"
    index: 1

# Handle result - check for Validation Error first, then expect Success
- runFlow:
    when:
      visible: "Validation Error"
    commands:
      - takeScreenshot: validation_error
      - fail: "Unexpected validation error during trip creation."
- extendedWaitUntil:
    visible: "Success"
    timeout: 15000
- tapOn: "OK"

# Check for success - should be on trip list now
- extendedWaitUntil:
    visible: "Your Trips"
    timeout: 15000

# ============================================================
# PHASE 3: Open trip and go to leg form
# ============================================================

# Dismiss Fast Refresh banner if present
- runFlow:
    when:
      visible: "Fast Refresh disconnected"
    commands:
      - tapOn: "Dismiss ✕"

# Dismiss debugger warning if covering content
- runFlow:
    when:
      visible: "Open debugger to view warnings"
    commands:
      - tapOn:
          point: "93%,94%"

# Wait for trip list to load and tap the trip card
- extendedWaitUntil:
    visible:
      id: "trip-card-MyTrip"
    timeout: 10000
- tapOn:
    id: "trip-card-MyTrip"

- extendedWaitUntil:
    visible: "Itinerary"
    timeout: 10000
- assertVisible:
    id: "leg-card-JPN"

# Tap Japan leg to open form
- tapOn:
    id: "leg-card-JPN"

# ============================================================
# PHASE 4: LegForm - save progress
# ============================================================

# Wait for the Travel Form screen to load
- extendedWaitUntil:
    visible: "Travel Form"
    timeout: 15000

# The form should auto-fill from profile data
# Scroll to see the action buttons
- scrollUntilVisible:
    element: "Save Progress"
    direction: DOWN
    timeout: 10000

- tapOn: "Save Progress"

# Success alert
- extendedWaitUntil:
    visible: "Form data saved successfully!"
    timeout: 10000
- tapOn: "OK"
