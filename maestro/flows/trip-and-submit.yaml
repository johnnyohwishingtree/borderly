# Full flow: Onboarding + Trip Creation + Form + Submission Guide
# Single user, single country (Japan) - validates the complete happy path
appId: com.borderly.app
tags:
  - trip
  - submission
  - critical
---

# ============================================================
# PHASE 1: Onboarding
# ============================================================
- launchApp:
    clearState: true

- runFlow: subflows/onboard-primary-user.yaml

# ============================================================
# PHASE 2: Create a trip to Japan
# ============================================================

- runFlow: subflows/create-japan-trip.yaml

# ============================================================
# PHASE 3: Open trip and go to leg form
# ============================================================

# Wait for trip list and tap the trip card
- tapOn:
    id: "trip-card-Smith Family Asia"

- extendedWaitUntil:
    visible: "Itinerary"
    timeout: 10000
- assertVisible:
    id: "leg-card-JPN"

# Tap Japan leg to open form
- tapOn:
    id: "leg-card-JPN"

# ============================================================
# PHASE 4: LegForm - fill remaining fields and mark as ready
# ============================================================
# Most fields are auto-filled from profile/trip data.
# batchAutoFill defaults booleans to false and purposeOfVisit to 'tourism'.
# Only departureCity (text, no autoFillSource) needs manual entry.
# hotelPhone is optional but we fill it for completeness.

# Wait for the Travel Form screen to load
- extendedWaitUntil:
    visible: "Travel Form"
    timeout: 15000

# Wait for form content to render (Form Summary appears first)
- extendedWaitUntil:
    visible: "Form Summary"
    timeout: 10000

# Dismiss Fast Refresh banner if present (may appear with delay)
- runFlow:
    when:
      visible: "Fast Refresh"
    commands:
      - tapOn: "Dismiss"

# Scroll past Form Summary to reach actual form fields
- scrollUntilVisible:
    element:
      id: "field-departureCity"
    direction: DOWN
    timeout: 15000

# City of Departure — the only required field without autoFillSource
- tapOn:
    id: "field-departureCity"
- inputText: "Los Angeles"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Hotel Phone — optional but fill for completeness
- scrollUntilVisible:
    element:
      id: "field-hotelPhone"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "field-hotelPhone"
- inputText: "03-5322-1234"

# Dismiss keyboard by tapping the return key then tapping header area
- pressKey: Enter
- tapOn: "Travel Form"

# Save progress
- scrollUntilVisible:
    element:
      id: "save-progress-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "save-progress-button"

# Success alert — tap OK to dismiss
- extendedWaitUntil:
    visible: "OK"
    timeout: 10000
- tapOn: "OK"

# Mark as Ready — button is in fixed footer, no scroll needed
- extendedWaitUntil:
    visible: "Mark as Ready"
    timeout: 10000
- tapOn:
    id: "mark-ready-button"

# Success alert — tap OK which navigates back
- extendedWaitUntil:
    visible: "OK"
    timeout: 10000
- tapOn: "OK"

# Verify we're back on the trip detail screen
- extendedWaitUntil:
    visible: "Itinerary"
    timeout: 10000

# ============================================================
# PHASE 5: Open Submission Guide and verify portal screen
# ============================================================

# Tap Japan leg again to get back to the form
- tapOn:
    id: "leg-card-JPN"

- extendedWaitUntil:
    visible: "Travel Form"
    timeout: 10000

# Form should be ready — Open Submission Guide button should be visible
- scrollUntilVisible:
    element:
      id: "open-submission-guide-button"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "open-submission-guide-button"

# Verify the submission guide loaded (not stuck on "Loading submission guide...")
- extendedWaitUntil:
    visible: "Submission Guide"
    timeout: 15000
- assertVisible: "Open Portal"
- assertVisible: "Submission Timing"

# Tap "Submit in App" / "Open Portal" to navigate to the in-app portal screen.
# If the button launches an external browser (Linking.openURL), it may not
# navigate within the app — we verify the portal screen OR the submission guide
# is still visible.
- runFlow:
    when:
      visible: "Submit in App"
    commands:
      - tapOn: "Submit in App"
      # Verify the portal submission screen or a related screen loaded
      - extendedWaitUntil:
          visible:
            anyOf:
              - id: "portal-submission-screen"
              - text: "Government Portal"
              - text: "Visit Japan Web"
              - text: "Unable to Load Portal"
              - text: "Submission Guide"
          timeout: 20000
