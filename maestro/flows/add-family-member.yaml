# Reusable flow: Add a family member via manual passport entry
# Expects to start from the main app (onboarding complete)
# Parameters:
#   RELATIONSHIP: spouse | child | parent | other
#   PASSPORT_NUM: passport number
#   SURNAME: family name
#   GIVEN_NAMES: given names
#   NATIONALITY: 3-letter country code
#   DOB: date of birth (YYYY-MM-DD)
#   GENDER: Male | Female | Other
#   EXPIRY: passport expiry (YYYY-MM-DD)
#   ISSUING_COUNTRY: 3-letter country code
appId: com.borderly.app
tags:
  - family
---
# Navigate to Profile tab
- tapOn: "Profile"

# Go to family management
- scrollUntilVisible:
    element: "Manage"
    direction: DOWN
    timeout: 5000
- tapOn: "Manage"

# Add new member
- assertVisible: "Family Members"
- tapOn: "Add Member"

# Select relationship
- assertVisible: "Add Family Member"
- tapOn: "${RELATIONSHIP}"

# Choose manual entry
- tapOn: "Enter Manually"

# Fill passport form (same as onboarding but in family mode)
- assertVisible: "Add Family Member"
- tapOn:
    id: "passport-number-input"
- inputText: "${PASSPORT_NUM}"

- tapOn:
    id: "surname-input"
- inputText: "${SURNAME}"

- tapOn:
    id: "given-names-input"
- inputText: "${GIVEN_NAMES}"

- tapOn:
    id: "nationality-input"
- inputText: "${NATIONALITY}"

- tapOn:
    id: "dob-input"
- inputText: "${DOB}"

- tapOn:
    id: "gender-${GENDER}-button"

- scrollUntilVisible:
    element: "Continue"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "passport-expiry-input"
- inputText: "${EXPIRY}"

- tapOn:
    id: "issuing-country-input"
- inputText: "${ISSUING_COUNTRY}"

- tapOn: "Continue"
