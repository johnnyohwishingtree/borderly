# Smoke test: full onboarding from scratch through to main screen
# Requires: Release build installed on simulator (no Metro dependency)
appId: com.borderly.app
tags:
  - smoke
  - onboarding
---
- launchApp:
    clearState: true

# === WELCOME SCREEN ===
- extendedWaitUntil:
    visible: "Borderly"
    timeout: 15000
- assertVisible: "Welcome to"
- scrollUntilVisible:
    element:
      id: "take-tutorial-button"
    direction: DOWN
- tapOn:
    id: "take-tutorial-button"

# === TUTORIAL SCREEN ===
- extendedWaitUntil:
    visible: "Step 1 of 5"
    timeout: 10000
- tapOn:
    id: "skip-tutorial-button"

# === PASSPORT SCAN SCREEN ===
- extendedWaitUntil:
    visible: "Passport Information"
    timeout: 15000

# Dismiss performance optimization hint if present
- runFlow:
    when:
      visible: "Performance Optimization Enabled"
    commands:
      - tapOn: "Dismiss"

# Choose manual entry
- scrollUntilVisible:
    element:
      id: "enter-manually-button"
    direction: DOWN
- tapOn:
    id: "enter-manually-button"

# === MANUAL PASSPORT FORM ===
# Wait for form to render
- extendedWaitUntil:
    visible:
      id: "passport-number-input"
    timeout: 10000

# Swipe content down to reveal passport number at the top of the form
- swipe:
    start: "50%,30%"
    end: "50%,60%"
    duration: 300

# Passport Number
- tapOn:
    id: "passport-number-input"
- inputText: "L12345678"
# Dismiss keyboard with a drag gesture (keyboardDismissMode=on-drag)
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Surname
- scrollUntilVisible:
    element:
      id: "surname-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "surname-input"
- inputText: "SMITH"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Given Names
- scrollUntilVisible:
    element:
      id: "given-names-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "given-names-input"
- inputText: "JOHN MICHAEL"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Nationality
- scrollUntilVisible:
    element:
      id: "nationality-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "nationality-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Date of Birth
- scrollUntilVisible:
    element:
      id: "dob-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "dob-input"
- inputText: "1985-06-15"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Gender
- scrollUntilVisible:
    element:
      id: "gender-Male-button"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "gender-Male-button"

# Passport expiry
- scrollUntilVisible:
    element:
      id: "passport-expiry-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "passport-expiry-input"
- inputText: "2032-03-20"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Issuing country
- scrollUntilVisible:
    element:
      id: "issuing-country-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "issuing-country-input"
- inputText: "USA"
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Ensure keyboard is dismissed before scrolling to Continue
- swipe:
    start: "50%,40%"
    end: "50%,35%"
    duration: 200

# Submit
- scrollUntilVisible:
    element: "Continue"
    direction: DOWN
- tapOn: "Continue"

# === CONFIRM PROFILE SCREEN ===
- extendedWaitUntil:
    visible: "Confirm Your Profile"
    timeout: 30000
- assertVisible: "L12345678"
- assertVisible: "JOHN MICHAEL SMITH"
# Dismiss debugger warning if covering buttons
- runFlow:
    when:
      visible: "Open debugger to view warnings"
    commands:
      - tapOn:
          point: "93%,94%"
- scrollUntilVisible:
    element:
      id: "continue-to-security-button"
    direction: DOWN
- tapOn:
    id: "continue-to-security-button"

# === BIOMETRIC SETUP SCREEN ===
- extendedWaitUntil:
    visible: "Secure Your Profile"
    timeout: 15000
- tapOn: "Skip for Now"

# Skip confirmation alert
- extendedWaitUntil:
    visible: "Skip"
    timeout: 5000
- tapOn: "Skip"

# Welcome alert
- extendedWaitUntil:
    visible: "OK"
    timeout: 5000
- tapOn: "OK"

# === MAIN SCREEN ===
- extendedWaitUntil:
    visible: "Your Trips"
    timeout: 15000
- assertVisible: "No trips yet"
