# Smoke test: full onboarding from scratch through to main screen
# Requires: Release build installed on simulator (no Metro dependency)
appId: com.borderly.app
tags:
  - smoke
  - onboarding
---
- launchApp:
    clearState: true

# === WELCOME SCREEN ===
- extendedWaitUntil:
    visible: "Borderly"
    timeout: 15000
- assertVisible: "Welcome to"
- scrollUntilVisible:
    element: "Take Quick Tutorial"
    direction: DOWN
- tapOn: "Take Quick Tutorial"

# === TUTORIAL SCREEN ===
- extendedWaitUntil:
    visible: "Step 1 of 5"
    timeout: 10000
- tapOn: "Skip tutorial"

# === PASSPORT SCAN SCREEN ===
- extendedWaitUntil:
    visible: "Passport Information"
    timeout: 15000

# Dismiss performance optimization hint if present
- runFlow:
    when:
      visible: "Performance Optimization Enabled"
    commands:
      - tapOn: "Dismiss"

# Choose manual entry
- scrollUntilVisible:
    element: "Enter Manually"
    direction: DOWN
- tapOn: "Enter Manually"

# === MANUAL PASSPORT FORM ===
- swipe:
    direction: DOWN
    duration: 500

# Passport Number
- tapOn: "Passport Number, required"
- inputText: "L12345678"
- tapOn: "Scanning Tips"

# Surname
- tapOn: "Surname (Family Name), required"
- inputText: "SMITH"
- tapOn: "Scanning Tips"

# Given Names
- tapOn: "Given Names, required"
- inputText: "JOHN MICHAEL"
- tapOn: "Scanning Tips"

# Nationality
- tapOn: "Nationality, required"
- inputText: "USA"
- tapOn: "Scanning Tips"

# Date of Birth
- tapOn: "Date of Birth, required"
- inputText: "1985-06-15"
- tapOn: "Scanning Tips"

# Gender
- scrollUntilVisible:
    element: "Male"
    direction: DOWN
- tapOn: "Male"

# Passport expiry
- tapOn: "Passport Expiry Date, required"
- inputText: "2032-03-20"
- tapOn: "Male"

# Issuing country
- tapOn: "Issuing Country, required"
- inputText: "USA"
- tapOn: "Male"

# Submit
- scrollUntilVisible:
    element: "Continue"
    direction: DOWN
- tapOn: "Continue"

# === CONFIRM PROFILE SCREEN ===
- extendedWaitUntil:
    visible: "Confirm Your Profile"
    timeout: 30000
- assertVisible: "L12345678"
- assertVisible: "JOHN MICHAEL SMITH"
- scrollUntilVisible:
    element: "Continue to Security Setup"
    direction: DOWN
- tapOn: "Continue to Security Setup"

# === BIOMETRIC SETUP SCREEN ===
- extendedWaitUntil:
    visible: "Secure Your Profile"
    timeout: 15000
- tapOn: "Skip for Now"

# Skip confirmation alert
- extendedWaitUntil:
    visible: "Skip"
    timeout: 5000
- tapOn: "Skip"

# Welcome alert
- extendedWaitUntil:
    visible: "OK"
    timeout: 5000
- tapOn: "OK"

# === MAIN SCREEN ===
- extendedWaitUntil:
    visible: "Your Trips"
    timeout: 15000
- assertVisible: "No trips yet"
