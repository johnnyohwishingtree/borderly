<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <radialGradient id="backgroundGradient" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </radialGradient>
    <linearGradient id="passportGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="qrGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F3F4F6" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#backgroundGradient)" rx="180"/>

  <!-- Passport book -->
  <g transform="translate(200, 280)">
    <!-- Passport cover -->
    <rect x="0" y="0" width="280" height="380" rx="12" fill="url(#passportGradient)"/>
    <rect x="8" y="8" width="264" height="364" rx="8" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
    
    <!-- Passport title text -->
    <text x="140" y="80" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="bold" opacity="0.9">PASSPORT</text>
    
    <!-- Country emblem placeholder -->
    <circle cx="140" cy="150" r="45" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
    <circle cx="140" cy="150" r="35" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
    
    <!-- MRZ lines at bottom -->
    <rect x="20" y="320" width="240" height="4" rx="2" fill="#FFFFFF" opacity="0.4"/>
    <rect x="20" y="330" width="240" height="4" rx="2" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Digital transformation arrow -->
  <g transform="translate(520, 380)">
    <path d="M0 20 L80 20 L65 10 M80 20 L65 30" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <circle cx="40" cy="20" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="50" cy="20" r="3" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="60" cy="20" r="3" fill="#FFFFFF" opacity="0.6"/>
  </g>

  <!-- Mobile device with QR code -->
  <g transform="translate(620, 240)">
    <!-- Phone outline -->
    <rect x="0" y="0" width="180" height="320" rx="25" fill="#1F2937"/>
    <rect x="8" y="8" width="164" height="304" rx="20" fill="#111827"/>
    
    <!-- Screen -->
    <rect x="16" y="40" width="148" height="240" rx="12" fill="url(#qrGradient)"/>
    
    <!-- QR code pattern -->
    <g transform="translate(36, 60)">
      <!-- QR corner markers -->
      <rect x="0" y="0" width="24" height="24" fill="#1F2937"/>
      <rect x="4" y="4" width="16" height="16" fill="#FFFFFF"/>
      <rect x="8" y="8" width="8" height="8" fill="#1F2937"/>
      
      <rect x="84" y="0" width="24" height="24" fill="#1F2937"/>
      <rect x="88" y="4" width="16" height="16" fill="#FFFFFF"/>
      <rect x="92" y="8" width="8" height="8" fill="#1F2937"/>
      
      <rect x="0" y="176" width="24" height="24" fill="#1F2937"/>
      <rect x="4" y="180" width="16" height="16" fill="#FFFFFF"/>
      <rect x="8" y="184" width="8" height="8" fill="#1F2937"/>
      
      <!-- QR data pattern -->
      <rect x="32" y="8" width="4" height="4" fill="#1F2937"/>
      <rect x="40" y="8" width="4" height="4" fill="#1F2937"/>
      <rect x="56" y="8" width="4" height="4" fill="#1F2937"/>
      <rect x="32" y="16" width="4" height="4" fill="#1F2937"/>
      <rect x="48" y="16" width="4" height="4" fill="#1F2937"/>
      <rect x="64" y="16" width="4" height="4" fill="#1F2937"/>
      
      <!-- More QR pattern elements -->
      <rect x="8" y="32" width="4" height="4" fill="#1F2937"/>
      <rect x="24" y="32" width="4" height="4" fill="#1F2937"/>
      <rect x="40" y="32" width="4" height="4" fill="#1F2937"/>
      <rect x="56" y="32" width="4" height="4" fill="#1F2937"/>
      <rect x="72" y="32" width="4" height="4" fill="#1F2937"/>
      <rect x="88" y="32" width="4" height="4" fill="#1F2937"/>
      <rect x="104" y="32" width="4" height="4" fill="#1F2937"/>
    </g>
    
    <!-- Status indicators -->
    <circle cx="40" cy="20" r="3" fill="#10B981"/>
    <circle cx="140" cy="20" r="3" fill="#10B981"/>
  </g>

  <!-- Brand name -->
  <text x="512" y="920" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="48" font-weight="700" opacity="0.95">Borderly</text>
  <text x="512" y="960" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="20" font-weight="400" opacity="0.7">Travel Simplified</text>
</svg>